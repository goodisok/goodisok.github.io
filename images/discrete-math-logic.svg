<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
<rect width="800" height="520" fill="#1a1a2e"/>
<text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="22" font-weight="bold">逻辑门与布尔代数</text>
<rect x="50" y="80" width="210" height="190" rx="6" fill="#16213e" stroke="#ff6b6b" stroke-width="1.5"/>
<text x="155.0" y="105" text-anchor="middle" fill="#ff6b6b" font-family="sans-serif" font-size="16" font-weight="bold">AND</text>
<text x="155.0" y="122" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="12">与门</text>
<rect x="95" y="165" width="100" height="60" rx="12" fill="none" stroke="#ff6b6b" stroke-width="2"/>
<text x="65" y="185" fill="#ccc" font-family="sans-serif" font-size="12">p</text>
<text x="65" y="215" fill="#ccc" font-family="sans-serif" font-size="12">q</text>
<text x="220" y="198" fill="#ff6b6b" font-family="sans-serif" font-size="13">p · q</text>
<rect x="290" y="80" width="210" height="190" rx="6" fill="#16213e" stroke="#4ecdc4" stroke-width="1.5"/>
<text x="395.0" y="105" text-anchor="middle" fill="#4ecdc4" font-family="sans-serif" font-size="16" font-weight="bold">OR</text>
<text x="395.0" y="122" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="12">或门</text>
<path d="M345,165 Q375,165 435,185 Q445,195 435,205 Q375,225 345,225 Z" fill="none" stroke="#4ecdc4" stroke-width="2"/>
<text x="305" y="185" fill="#ccc" font-family="sans-serif" font-size="12">p</text>
<text x="305" y="215" fill="#ccc" font-family="sans-serif" font-size="12">q</text>
<text x="460" y="198" fill="#4ecdc4" font-family="sans-serif" font-size="13">p + q</text>
<rect x="530" y="80" width="210" height="190" rx="6" fill="#16213e" stroke="#f0a500" stroke-width="1.5"/>
<text x="635.0" y="105" text-anchor="middle" fill="#f0a500" font-family="sans-serif" font-size="16" font-weight="bold">NOT</text>
<text x="635.0" y="122" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="12">非门</text>
<polygon points="585,155 675,195 585,235" fill="none" stroke="#f0a500" stroke-width="2"/>
<circle cx="685" cy="195" r="7" fill="none" stroke="#f0a500" stroke-width="2"/>
<text x="545" y="185" fill="#ccc" font-family="sans-serif" font-size="12">p</text>
<text x="700" y="198" fill="#f0a500" font-family="sans-serif" font-size="13">¬p</text>
<rect x="50" y="300" width="210" height="190" rx="6" fill="#16213e" stroke="#7c5cbf" stroke-width="1.5"/>
<text x="155.0" y="325" text-anchor="middle" fill="#7c5cbf" font-family="sans-serif" font-size="16" font-weight="bold">XOR</text>
<text x="155.0" y="342" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="12">异或门</text>
<path d="M105,385 Q135,385 155,415" fill="none" stroke="#7c5cbf" stroke-width="2"/>
<path d="M105,445 Q135,445 155,415" fill="none" stroke="#7c5cbf" stroke-width="2"/>
<circle cx="162" cy="415" r="6" fill="none" stroke="#7c5cbf" stroke-width="2"/>
<text x="65" y="405" fill="#ccc" font-family="sans-serif" font-size="12">p</text>
<text x="65" y="435" fill="#ccc" font-family="sans-serif" font-size="12">q</text>
<text x="220" y="418" fill="#7c5cbf" font-family="sans-serif" font-size="13">p ⊕ q</text>
<rect x="290" y="300" width="210" height="190" rx="6" fill="#16213e" stroke="#4ecdc4" stroke-width="1.5"/>
<text x="395.0" y="325" text-anchor="middle" fill="#4ecdc4" font-family="sans-serif" font-size="16" font-weight="bold">NAND</text>
<text x="395.0" y="342" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="12">与非门</text>
<rect x="335" y="385" width="85" height="60" rx="12" fill="none" stroke="#4ecdc4" stroke-width="2"/>
<circle cx="428" cy="415" r="6" fill="none" stroke="#4ecdc4" stroke-width="2"/>
<text x="305" y="405" fill="#ccc" font-family="sans-serif" font-size="12">p</text>
<text x="305" y="435" fill="#ccc" font-family="sans-serif" font-size="12">q</text>
<text x="460" y="418" fill="#4ecdc4" font-family="sans-serif" font-size="13">¬(p·q)</text>
<rect x="530" y="300" width="210" height="190" rx="6" fill="#16213e" stroke="#ff6b6b" stroke-width="1.5"/>
<text x="635.0" y="325" text-anchor="middle" fill="#ff6b6b" font-family="sans-serif" font-size="16" font-weight="bold">NOR</text>
<text x="635.0" y="342" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="12">或非门</text>
<path d="M585,385 Q615,385 660,405 Q660,425 615,445 Z" fill="none" stroke="585" stroke-width="2"/>
<circle cx="665" cy="415" r="6" fill="none" stroke="#ff6b6b" stroke-width="2"/>
<text x="545" y="405" fill="#ccc" font-family="sans-serif" font-size="12">p</text>
<text x="545" y="435" fill="#ccc" font-family="sans-serif" font-size="12">q</text>
<text x="700" y="418" fill="#ff6b6b" font-family="sans-serif" font-size="13">¬(p+q)</text>
<rect x="100" y="470" width="600" height="35" rx="6" fill="none" stroke="#555" stroke-width="1"/>
<text x="400" y="494" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="13" font-style="italic">“任何布尔函数都可用 AND、OR、NOT 组合实现” —— 布尔代数完备性</text>
</svg>