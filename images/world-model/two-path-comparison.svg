<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="#ffffff"/>
  <text x="600" y="36" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1e293b">世界模型两条技术路径对比</text>
  <text x="600" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">隐状态路径 (Dreamer系列) vs 像素生成路径 (Sora/Genie)</text>
  <rect x="60" y="80" width="520" height="40" rx="8" fill="#2563eb"/>
  <text x="320.0" y="105" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">路径一：隐状态世界模型 (Latent State)</text>
  <rect x="75" y="145" width="490" height="55" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="87" y="167" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">观测 o_t (像素)</text>
  <text x="87" y="187" font-family="sans-serif" font-size="11" fill="#64748b">高维原始输入</text>
  <rect x="75" y="225" width="490" height="55" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="87" y="247" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Encoder → 隐状态 z_t</text>
  <text x="87" y="267" font-family="sans-serif" font-size="11" fill="#64748b">压缩到低维潜空间 (64-1024d)</text>
  <rect x="75" y="305" width="490" height="55" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="87" y="327" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">RSSM 动力学推演</text>
  <text x="87" y="347" font-family="sans-serif" font-size="11" fill="#64748b">z_t → h_t → ẑ_{t+1} (隐空间想象)</text>
  <rect x="75" y="385" width="490" height="55" rx="8" fill="#93c5fd" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="87" y="407" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">策略学习 (Actor-Critic)</text>
  <text x="87" y="427" font-family="sans-serif" font-size="11" fill="#64748b">在隐想象中反向传播梯度</text>
  <rect x="75" y="465" width="490" height="55" rx="8" fill="#60a5fa" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="87" y="487" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">动作输出 a_t</text>
  <text x="87" y="507" font-family="sans-serif" font-size="11" fill="#64748b">低维动作向量 (6-20d)</text>
  <line x1="320.0" y1="200" x2="320.0" y2="212.5" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="320.0" y1="212.5" x2="320.0" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="320.0" y1="280" x2="320.0" y2="292.5" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="320.0" y1="292.5" x2="320.0" y2="305" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="320.0" y1="360" x2="320.0" y2="372.5" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="320.0" y1="372.5" x2="320.0" y2="385" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="320.0" y1="440" x2="320.0" y2="452.5" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="320.0" y1="452.5" x2="320.0" y2="465" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="75" y="545" width="490" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="275" y="568" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">关键特征</text>
  <text x="80" y="588" font-family="sans-serif" font-size="11" fill="#475569">✓ 显式状态表征 → 可解释</text>
  <text x="80" y="605" font-family="sans-serif" font-size="11" fill="#475569">✓ 主动交互 → 通过 RL 微调策略</text>
  <text x="80" y="622" font-family="sans-serif" font-size="11" fill="#475569">✗ 不重建像素 → 视觉质量有限</text>
  <rect x="620" y="80" width="520" height="40" rx="8" fill="#7c3aed"/>
  <text x="880.0" y="105" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">路径二：像素生成世界模型 (Video Generation)</text>
  <rect x="635" y="145" width="490" height="55" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="647" y="167" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">观测 o_t (像素)</text>
  <text x="647" y="187" font-family="sans-serif" font-size="11" fill="#64748b">高维原始输入</text>
  <rect x="635" y="225" width="490" height="55" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="647" y="247" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Video Tokenizer</text>
  <text x="647" y="267" font-family="sans-serif" font-size="11" fill="#64748b">VQ-VAE / Patchify → 离散 Tokens</text>
  <rect x="635" y="305" width="490" height="55" rx="8" fill="#e9d5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="647" y="327" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Transformer / DiT 预测</text>
  <text x="647" y="347" font-family="sans-serif" font-size="11" fill="#64748b">自回归或扩散生成下一帧 Tokens</text>
  <rect x="635" y="385" width="490" height="55" rx="8" fill="#d8b4fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="647" y="407" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Video Decoder</text>
  <text x="647" y="427" font-family="sans-serif" font-size="11" fill="#64748b">Tokens → 像素级视频帧 ô_{t+1}</text>
  <rect x="635" y="465" width="490" height="55" rx="8" fill="#c084fc" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="647" y="487" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">视觉输出 ô_{t+1}</text>
  <text x="647" y="507" font-family="sans-serif" font-size="11" fill="#64748b">直接生成完整视频帧（1080p）</text>
  <line x1="880.0" y1="200" x2="880.0" y2="212.5" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="880.0" y1="212.5" x2="880.0" y2="225" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="880.0" y1="280" x2="880.0" y2="292.5" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="880.0" y1="292.5" x2="880.0" y2="305" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="880.0" y1="360" x2="880.0" y2="372.5" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="880.0" y1="372.5" x2="880.0" y2="385" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="880.0" y1="440" x2="880.0" y2="452.5" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="880.0" y1="452.5" x2="880.0" y2="465" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <rect x="635" y="545" width="490" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="895" y="568" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">关键特征</text>
  <text x="640" y="588" font-family="sans-serif" font-size="11" fill="#475569">✓ 像素级视觉质量 → 逼真</text>
  <text x="640" y="605" font-family="sans-serif" font-size="11" fill="#475569">✗ 无显式状态 → 不可解释</text>
  <text x="640" y="622" font-family="sans-serif" font-size="11" fill="#475569">✗ 被动观察 → 交互困难</text>
  <rect x="60" y="660" width="1080" height="70" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="682" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">代表工作</text>
  <text x="300" y="682" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2563eb">DreamerV3 / TD-MPC2 / DayDreamer</text>
  <text x="775" y="682" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">|</text>
  <text x="880" y="682" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">Sora / Genie 2 / GameNGen / DIAMOND</text>
  <text x="600" y="706" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">适用场景：交互式决策（机器人、游戏AI） ← → 适用场景：内容生成、视觉模拟、世界模拟器</text>
</svg>