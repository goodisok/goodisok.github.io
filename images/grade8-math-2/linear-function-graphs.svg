<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500">
<style>text{font-family:"WenQuanYi Zen Hei","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}</style>
<rect width="720" height="500" fill="#ffffff"/>
<text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">一次函数 y = kx + b 的图象</text>
<rect x="25" y="50" width="155" height="40" rx="6" fill="#f8fafc" stroke="#16a34a" stroke-width="1"/>
<text x="102" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">k&gt;0,b&gt;0</text>
<rect x="25" y="95" width="155" height="155" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
<line x1="40" y1="172" x2="165" y2="172" stroke="#9ca3af" stroke-width="0.8"/>
<line x1="102" y1="185" x2="102" y2="100" stroke="#9ca3af" stroke-width="0.8"/>
<polygon points="165,172 160,169 160,175" fill="#9ca3af"/>
<polygon points="102,100 99,105 105,105" fill="#9ca3af"/>
<line x1="55" y1="215" x2="160" y2="125" stroke="#16a34a" stroke-width="2"/>
<text x="155" y="117" font-size="10" fill="#16a34a">y=x+1</text>
<text x="160" y="188" font-size="10" fill="#374151">↗上升</text>
<rect x="195" y="50" width="155" height="40" rx="6" fill="#f8fafc" stroke="#2563eb" stroke-width="1"/>
<text x="272" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">k&gt;0,b&lt;0</text>
<rect x="195" y="95" width="155" height="155" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
<line x1="210" y1="172" x2="335" y2="172" stroke="#9ca3af" stroke-width="0.8"/>
<line x1="272" y1="355" x2="272" y2="100" stroke="#9ca3af" stroke-width="0.8"/>
<polygon points="335,172 330,169 330,175" fill="#9ca3af"/>
<polygon points="272,100 269,105 275,105" fill="#9ca3af"/>
<line x1="220" y1="200" x2="325" y2="110" stroke="#2563eb" stroke-width="2"/>
<text x="320" y="102" font-size="10" fill="#2563eb">y=x−1</text>
<text x="330" y="188" font-size="10" fill="#374151">↗上升</text>
<rect x="365" y="50" width="155" height="40" rx="6" fill="#f8fafc" stroke="#dc2626" stroke-width="1"/>
<text x="442" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">k&lt;0,b&gt;0</text>
<rect x="365" y="95" width="155" height="155" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
<line x1="380" y1="172" x2="505" y2="172" stroke="#9ca3af" stroke-width="0.8"/>
<line x1="442" y1="525" x2="442" y2="100" stroke="#9ca3af" stroke-width="0.8"/>
<polygon points="505,172 500,169 500,175" fill="#9ca3af"/>
<polygon points="442,100 439,105 445,105" fill="#9ca3af"/>
<line x1="385" y1="120" x2="500" y2="220" stroke="#dc2626" stroke-width="2"/>
<text x="495" y="212" font-size="10" fill="#dc2626">y=−x+1</text>
<text x="500" y="188" font-size="10" fill="#374151">↘下降</text>
<rect x="535" y="50" width="155" height="40" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1"/>
<text x="612" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">k&lt;0,b&lt;0</text>
<rect x="535" y="95" width="155" height="155" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
<line x1="550" y1="172" x2="675" y2="172" stroke="#9ca3af" stroke-width="0.8"/>
<line x1="612" y1="695" x2="612" y2="100" stroke="#9ca3af" stroke-width="0.8"/>
<polygon points="675,172 670,169 670,175" fill="#9ca3af"/>
<polygon points="612,100 609,105 615,105" fill="#9ca3af"/>
<line x1="555" y1="145" x2="670" y2="245" stroke="#7c3aed" stroke-width="2"/>
<text x="665" y="237" font-size="10" fill="#7c3aed">y=−x−1</text>
<text x="670" y="188" font-size="10" fill="#374151">↘下降</text>
<rect x="70" y="275" width="580" height="195" rx="10" fill="#f8fafc" stroke="#d1d5db" stroke-width="1.5"/>
<text x="360" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">性质总结</text>
<text x="90" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">k＞0</text>
<text x="290" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">k＜0</text>
<text x="490" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">k＝0</text>
<text x="170" y="348" text-anchor="middle" font-size="11" fill="#16a34a">y随x增大而增大↗</text>
<text x="360" y="348" text-anchor="middle" font-size="11" fill="#dc2626">y随x增大而减小↘</text>
<text x="530" y="348" text-anchor="middle" font-size="11" fill="#6b7280">y=b(常函数)</text>
<text x="360" y="380" text-anchor="middle" font-size="12" fill="#374151">b决定与y轴交点(0,b)  |  |k|越大直线越陡</text>
<text x="360" y="405" text-anchor="middle" font-size="11" fill="#7c3aed">正比例函数y=kx是一次函数特例(b=0,过原点)</text>
<text x="360" y="430" text-anchor="middle" font-size="11" fill="#6b7280">待定系数法:已知两点→k=(y₂−y₁)/(x₂−x₁)→代入求b</text>
</svg>