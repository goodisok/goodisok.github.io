<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480">
<style>text{font-family:"WenQuanYi Zen Hei","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}</style>
<rect width="720" height="480" fill="#ffffff"/>
<text x="360" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">平行四边形族谱</text>
<rect x="260" y="75" width="200" height="50" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
<text x="360" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">四边形</text>
<defs><marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3"><polygon points="0 0,8 3,0 6" fill="#9ca3af"/></marker><marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker><marker id="ap" markerWidth="8" markerHeight="6" refX="8" refY="3"><polygon points="0 0,8 3,0 6" fill="#7c3aed"/></marker></defs>
<line x1="360" y1="125" x2="360" y2="155" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="380" y="143" font-size="10" fill="#6b7280">两组对边平行</text>
<rect x="260" y="158" width="200" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="360" y="189" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">平行四边形</text>
<line x1="310" y1="208" x2="180" y2="255" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
<text x="240" y="228" text-anchor="middle" font-size="10" fill="#2563eb">有一个直角</text>
<line x1="410" y1="208" x2="540" y2="255" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ap)"/>
<text x="480" y="228" text-anchor="middle" font-size="10" fill="#7c3aed">邻边相等</text>
<rect x="60" y="270" width="200" height="65" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="160" y="298" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">矩形</text>
<text x="160" y="316" text-anchor="middle" font-size="10" fill="#374151">四直角,对角线相等</text>
<rect x="460" y="270" width="200" height="65" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
<text x="560" y="298" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">菱形</text>
<text x="560" y="316" text-anchor="middle" font-size="10" fill="#374151">四边相等,对角线⊥</text>
<line x1="210" y1="335" x2="310" y2="395" stroke="#2563eb" stroke-width="1.5"/>
<line x1="510" y1="335" x2="410" y2="395" stroke="#7c3aed" stroke-width="1.5"/>
<text x="250" y="365" text-anchor="middle" font-size="10" fill="#374151">邻边相等</text>
<text x="470" y="365" text-anchor="middle" font-size="10" fill="#374151">一直角</text>
<rect x="240" y="395" width="240" height="55" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
<text x="360" y="423" text-anchor="middle" font-size="14" font-weight="700" fill="#db2777">正方形</text>
<text x="360" y="441" text-anchor="middle" font-size="10" fill="#374151">四边相等+四直角=矩形+菱形</text>
</svg>