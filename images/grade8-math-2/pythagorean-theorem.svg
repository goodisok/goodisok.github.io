<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460">
<style>text{font-family:"WenQuanYi Zen Hei","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}</style>
<rect width="720" height="460" fill="#ffffff"/>
<text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">勾股定理 — 赵爽弦图</text>
<text x="360" y="52" text-anchor="middle" font-size="12" fill="#6b7280">《周髀算经》赵爽注·三国时期</text>
<rect x="110" y="70" width="245" height="245" fill="#f8fafc" stroke="#374151" stroke-width="2"/>
<polygon points="355,315 250,315 355,175" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
<polygon points="355,70 215,70 355,210" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
<polygon points="110,70 250,70 110,175" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1.5"/>
<polygon points="110,315 215,315 110,210" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1.5"/>
<polygon points="250,315 355,175 215,70 110,210" fill="#fef3c7" opacity="0.3" stroke="#d97706" stroke-width="2"/>
<text x="232" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">b</text>
<text x="370" y="192" font-size="14" font-weight="700" fill="#2563eb">a</text>
<text x="262" y="162" font-size="14" font-weight="700" fill="#d97706">c</text>
<rect x="350" y="310" width="5" height="5" fill="#16a34a"/>
<rect x="385" y="80" width="300" height="180" rx="8" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
<text x="535" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">面积推导</text>
<line x1="400" y1="120" x2="670" y2="120" stroke="#e5e7eb" stroke-width="1"/>
<text x="400" y="148" font-size="13" fill="#374151">大正方形 = 4三角形 + 小正方形</text>
<text x="400" y="172" font-size="14" font-weight="700" fill="#d97706">(a+b)² = 4×(ab/2) + c²</text>
<text x="400" y="198" font-size="13" fill="#374151">a²+2ab+b² = 2ab + c²</text>
<text x="400" y="250" font-size="16" font-weight="700" fill="#dc2626">a² + b² = c²</text>
<rect x="80" y="350" width="560" height="95" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
<text x="360" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">常用勾股数</text>
<text x="360" y="400" text-anchor="middle" font-size="13" fill="#374151">(3,4,5) (5,12,13) (6,8,10) (7,24,25) (8,15,17) (9,40,41)</text>
<text x="360" y="425" text-anchor="middle" font-size="11" fill="#6b7280">a=m²−n², b=2mn, c=m²+n²（m&gt;n&gt;0,互质,一奇一偶）</text>
</svg>