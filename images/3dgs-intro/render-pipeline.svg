<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="620" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">3DGS 渲染管线：四步法</text>
  <rect x="30" y="70" width="170" height="160" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="115.0" cy="100" r="18" fill="#3b82f6" opacity="0.9"/>
  <text x="115.0" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">in</text>
  <text x="115.0" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">输入</text>
  <text x="115.0" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">百万高斯椭球</text>
  <line x1="40" y1="165" x2="190" y2="165" stroke="#e2e8f0" stroke-width="1"/>
  <text x="44" y="182" font-family="Courier New, monospace" font-size="10" fill="#475569">位置 μ (3D)</text>
  <text x="44" y="196" font-family="Courier New, monospace" font-size="10" fill="#475569">缩放 s (3D)</text>
  <text x="44" y="210" font-family="Courier New, monospace" font-size="10" fill="#475569">旋转 q (4D)</text>
  <text x="44" y="224" font-family="Courier New, monospace" font-size="10" fill="#475569">不透明度 α</text>
  <text x="44" y="238" font-family="Courier New, monospace" font-size="10" fill="#475569">SH 系数 (48D)</text>
  <rect x="230" y="70" width="170" height="160" rx="10" fill="#eff6ff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="315.0" cy="100" r="18" fill="#3b82f6" opacity="0.9"/>
  <text x="315.0" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">1</text>
  <text x="315.0" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">投影</text>
  <text x="315.0" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">3D→2D</text>
  <line x1="240" y1="165" x2="390" y2="165" stroke="#e2e8f0" stroke-width="1"/>
  <text x="244" y="182" font-family="Courier New, monospace" font-size="10" fill="#475569">μ̂=K[R|t]μ̃</text>
  <text x="244" y="196" font-family="Courier New, monospace" font-size="10" fill="#475569">Σ≈JWΣWᵀJᵀ</text>
  <text x="244" y="210" font-family="Courier New, monospace" font-size="10" fill="#475569">透视投影</text>
  <text x="244" y="224" font-family="Courier New, monospace" font-size="10" fill="#475569">Jacobian近似</text>
  <rect x="430" y="70" width="170" height="160" rx="10" fill="#f0fdf4" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="515.0" cy="100" r="18" fill="#3b82f6" opacity="0.9"/>
  <text x="515.0" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">2</text>
  <text x="515.0" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">创建斑块</text>
  <text x="515.0" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Splatting</text>
  <line x1="440" y1="165" x2="590" y2="165" stroke="#e2e8f0" stroke-width="1"/>
  <text x="444" y="182" font-family="Courier New, monospace" font-size="10" fill="#475569">α(u)∝2D高斯</text>
  <text x="444" y="196" font-family="Courier New, monospace" font-size="10" fill="#475569">3σ半径裁剪</text>
  <text x="444" y="210" font-family="Courier New, monospace" font-size="10" fill="#475569">GPU光栅化</text>
  <text x="444" y="224" font-family="Courier New, monospace" font-size="10" fill="#475569">跳过不可见像素</text>
  <rect x="630" y="70" width="170" height="160" rx="10" fill="#fffbeb" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="715.0" cy="100" r="18" fill="#3b82f6" opacity="0.9"/>
  <text x="715.0" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">3</text>
  <text x="715.0" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">深度排序</text>
  <text x="715.0" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">GPU Radix Sort</text>
  <line x1="640" y1="165" x2="790" y2="165" stroke="#e2e8f0" stroke-width="1"/>
  <text x="644" y="182" font-family="Courier New, monospace" font-size="10" fill="#475569">每像素独立排序</text>
  <text x="644" y="196" font-family="Courier New, monospace" font-size="10" fill="#475569">从近到远</text>
  <text x="644" y="210" font-family="Courier New, monospace" font-size="10" fill="#475569">O(n)基数排序</text>
  <text x="644" y="224" font-family="Courier New, monospace" font-size="10" fill="#475569">CUDA定制实现</text>
  <rect x="830" y="70" width="100" height="160" rx="10" fill="#fff7ed" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="880.0" cy="100" r="18" fill="#3b82f6" opacity="0.9"/>
  <text x="880.0" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">4</text>
  <text x="880.0" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Alpha混合</text>
  <text x="880.0" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">从近到远叠加</text>
  <line x1="840" y1="165" x2="920" y2="165" stroke="#e2e8f0" stroke-width="1"/>
  <text x="844" y="182" font-family="Courier New, monospace" font-size="10" fill="#475569">C=ΣTiαici</text>
  <text x="844" y="196" font-family="Courier New, monospace" font-size="10" fill="#475569">Ti=Π(1-αj)</text>
  <text x="844" y="210" font-family="Courier New, monospace" font-size="10" fill="#475569">Early stopping</text>
  <text x="844" y="224" font-family="Courier New, monospace" font-size="10" fill="#475569">累积α→1终止</text>
  <line x1="200" y1="150" x2="230" y2="150" stroke="#2563eb" stroke-width="2.5" marker-end="url(#a1)"/>
  <line x1="400" y1="150" x2="430" y2="150" stroke="#2563eb" stroke-width="2.5" marker-end="url(#a1)"/>
  <line x1="600" y1="150" x2="630" y2="150" stroke="#2563eb" stroke-width="2.5" marker-end="url(#a1)"/>
  <line x1="800" y1="150" x2="830" y2="150" stroke="#2563eb" stroke-width="2.5" marker-end="url(#a1)"/>
  <rect x="30" y="270" width="900" height="130" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="50" y="298" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1e293b">GPU友好的设计取舍</text>
  <rect x="45" y="310" width="210" height="70" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="150" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2563eb">不跑神经网络</text>
  <text x="150" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">纯浮点+内存</text>
  <text x="150" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">无MLP前向传播</text>
  <rect x="270" y="310" width="210" height="70" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="375" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2563eb">Radix Sort</text>
  <text x="375" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">GPU基数排序O(n)</text>
  <text x="375" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">远快于CPU qsort</text>
  <rect x="495" y="310" width="210" height="70" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2563eb">Early Stopping</text>
  <text x="600" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">累积α后跳过</text>
  <text x="600" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">节省40-60%</text>
  <rect x="720" y="310" width="210" height="70" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="825" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2563eb">CUDA定制</text>
  <text x="825" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">绕开图形API</text>
  <text x="825" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">直接张量渲染</text>
  <rect x="30" y="430" width="900" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">结果：每个像素只处理 5-20 个覆盖的高斯斑块 → 135 FPS（RTX 4090）</text>
  <text x="480" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">对比 NeRF 每条光线跑 200 次 MLP → 0.06 FPS（Mip-NeRF 360）</text>
  <rect x="30" y="510" width="900" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="480" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#991b1b" font-weight="bold">与NeRF的本质区别</text>
  <text x="480" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#b91c1c">NeRF = 沿光线问这个点是什么颜色（被动查询） → 3DGS = 这个椭球覆盖了哪些像素（主动投影）</text>
</svg>