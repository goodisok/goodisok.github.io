<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <linearGradient id="gaussGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="580" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">一个高斯椭球的参数分解</text>
  <text x="480" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">每个椭球 = 59个浮点数 ≈ 236 字节。典型场景 100万~500万个。</text>
  <ellipse cx="300" cy="300" rx="110" ry="70" fill="url(#gaussGrad)" stroke="#7c3aed" stroke-width="2" transform="rotate(-15, 300, 300)"/>
  <line x1="190" y1="300" x2="410" y2="300" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" transform="rotate(-15, 300, 300)"/>
  <line x1="300" y1="230" x2="300" y2="370" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" transform="rotate(-15, 300, 300)"/>
  <line x1="300" y1="300" x2="370" y2="230" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" transform="rotate(-15, 300, 300)"/>
  <circle cx="300" cy="300" r="4" fill="#7c3aed"/>
  <text x="300" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7c3aed" font-weight="bold">μ</text>
  <rect x="500" y="100" width="420" height="65" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="500" y="100" width="6" height="65" rx="3" fill="#8b5cf6"/>
  <text x="520" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">位置 μ (3D)</text>
  <text x="520" y="138" font-family="Arial, sans-serif" font-size="11" fill="#64748b">椭球球心在三维</text>
  <text x="520" y="151" font-family="Arial, sans-serif" font-size="11" fill="#64748b">空间中的坐标</text>
  <text x="500" y="158" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#8b5cf6" font-weight="bold">x, y, z</text>
  <rect x="500" y="185" width="420" height="65" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="500" y="185" width="6" height="65" rx="3" fill="#3b82f6"/>
  <text x="520" y="205" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">缩放 s (3D)</text>
  <text x="520" y="223" font-family="Arial, sans-serif" font-size="11" fill="#64748b">三个主轴方向的</text>
  <text x="520" y="236" font-family="Arial, sans-serif" font-size="11" fill="#64748b">拉伸半径</text>
  <text x="500" y="243" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#3b82f6" font-weight="bold">sx, sy, sz</text>
  <rect x="500" y="270" width="420" height="65" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="500" y="270" width="6" height="65" rx="3" fill="#06b6d4"/>
  <text x="520" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">旋转四元数 q (4D)</text>
  <text x="520" y="308" font-family="Arial, sans-serif" font-size="11" fill="#64748b">椭球在三维空间</text>
  <text x="520" y="321" font-family="Arial, sans-serif" font-size="11" fill="#64748b">中的朝向</text>
  <text x="500" y="328" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#06b6d4" font-weight="bold">qw,qx,qy,qz</text>
  <rect x="500" y="355" width="420" height="65" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="500" y="355" width="6" height="65" rx="3" fill="#10b981"/>
  <text x="520" y="375" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">不透明度 α (1D)</text>
  <text x="520" y="393" font-family="Arial, sans-serif" font-size="11" fill="#64748b">中心最大不透明</text>
  <text x="520" y="406" font-family="Arial, sans-serif" font-size="11" fill="#64748b">度（0~1）</text>
  <text x="500" y="413" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#10b981" font-weight="bold">α ∈ [0,1]</text>
  <rect x="500" y="440" width="420" height="65" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="500" y="440" width="6" height="65" rx="3" fill="#f59e0b"/>
  <text x="520" y="460" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">球谐系数 SH (48D)</text>
  <text x="520" y="478" font-family="Arial, sans-serif" font-size="11" fill="#64748b">从不同方向看</text>
  <text x="520" y="491" font-family="Arial, sans-serif" font-size="11" fill="#64748b">的颜色（3阶）</text>
  <text x="500" y="498" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#f59e0b" font-weight="bold">3ch × 16coeff</text>
  <line x1="410" y1="250" x2="498" y2="132" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="410" y1="275" x2="498" y2="217" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="410" y1="300" x2="498" y2="302" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="410" y1="325" x2="498" y2="387" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="410" y1="350" x2="498" y2="472" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <rect x="500" y="518" width="420" height="42" rx="8" fill="#7c3aed" opacity="0.12" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="710" y="544" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#6d28d9">合计：59 个参数 ≈ 236 字节 / 个高斯</text>
  <rect x="30" y="480" width="440" height="80" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="250" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6d28d9">协方差矩阵的分解</text>
  <text x="250" y="520" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#6d28d9">Σ = R · S · Sᵀ · Rᵀ</text>
  <text x="250" y="542" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7c3aed">R: 旋转矩阵（来自 q）  S: 对角缩放矩阵  → 始终正定</text>
</svg>