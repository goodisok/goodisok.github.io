<rect x="80" y="100" width="200" height="140" rx="12" ry="12" fill="#0d2b45" stroke="#79c0ff" stroke-width="2"/>
<text x="180.0" y="135" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="16" font-weight="bold">Codex (GPT-5.4)</text>
<text x="180.0" y="155" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">代码生成与策略编辑</text>
<text x="105" y="180" fill="#c9d1d9" font-family="sans-serif" font-size="11">• 分析当前策略缺陷</text>
<text x="105" y="198" fill="#c9d1d9" font-family="sans-serif" font-size="11">• 生成新状态检测器</text>
<text x="105" y="216" fill="#c9d1d9" font-family="sans-serif" font-size="11">• 编辑决策规则</text>
<rect x="520" y="100" width="200" height="140" rx="12" ry="12" fill="#0d2b20" stroke="#7ee787" stroke-width="2"/>
<text x="620.0" y="135" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="16" font-weight="bold">Python 策略 (.py)</text>
<text x="620.0" y="155" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">显式规则驱动</text>
<text x="545" y="180" fill="#c9d1d9" font-family="sans-serif" font-size="11">• 显式状态检测器</text>
<text x="545" y="198" fill="#c9d1d9" font-family="sans-serif" font-size="11">• 规则逻辑分支</text>
<text x="545" y="216" fill="#c9d1d9" font-family="sans-serif" font-size="11">• 测试用例日志</text>
<rect x="300" y="330" width="200" height="140" rx="12" ry="12" fill="#2d1a08" stroke="#ffa657" stroke-width="2"/>
<text x="400.0" y="365" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="16" font-weight="bold">环境执行与反馈</text>
<text x="400.0" y="385" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Atari Breakout 等</text>
<text x="325" y="410" fill="#c9d1d9" font-family="sans-serif" font-size="11">• 执行策略获得得分</text>
<text x="325" y="428" fill="#c9d1d9" font-family="sans-serif" font-size="11">• 记录失败状态</text>
<text x="325" y="446" fill="#c9d1d9" font-family="sans-serif" font-size="11">• 生成性能报告</text>
<line x1="280" y1="170.0" x2="520" y2="170.0" stroke="#79c0ff" stroke-width="2" marker-end="url(#arrow-79c0ff)"/>
<text x="400" y="155" text-anchor="middle" fill="#79c0ff" font-family="sans-serif" font-size="10">生成/编辑策略代码</text>
<line x1="620.0" y1="240" x2="500" y2="360" stroke="#7ee787" stroke-width="2" marker-end="url(#arrow-7ee787)"/>
<text x="575" y="285" text-anchor="middle" fill="#7ee787" font-family="sans-serif" font-size="10">执行策略</text>
<line x1="300" y1="400.0" x2="280" y2="260" stroke="#ffa657" stroke-width="2" marker-end="url(#arrow-ffa657)"/>
<text x="230" y="310" text-anchor="middle" fill="#ffa657" font-family="sans-serif" font-size="10">性能反馈与失败分析</text>
<text x="400" y="505" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">迭代循环：分析缺陷 → 编辑代码 → 执行验证 → 反馈</text>
<rect x="50" y="522" width="700" height="25" rx="8" fill="none" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3"/>
<text x="400" y="539" text-anchor="middle" fill="#f85149" font-family="sans-serif" font-size="11">关键区别：无梯度下降、无参数更新、无 GPU 训练 — 学习发生在代码层面而非权重层面</text>
</svg>