<text x="220" y="466" font-size="12" fill="#374151">• 双系统架构：System 1（快反应 ≤50ms）+ System 2（慢推理，LLM 规划）</text>
<text x="220" y="488" font-size="12" fill="#374151">• 训练数据：50 万小时仿真 + 真机遥操作 + 互联网视频（Cosmos 合成）</text>
<text x="220" y="510" font-size="12" fill="#374151">• 跨本体泛化：同一模型驱动 Figure 02 / 1X NEO / Fourier GR-1 / Unitree H1</text>
<text x="220" y="532" font-size="12" fill="#374151">• 开源程度：模型权重开源（Apache 2.0），训练代码未公开</text>
