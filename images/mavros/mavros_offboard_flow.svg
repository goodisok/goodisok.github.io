<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
<style>text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
  </marker>
</defs>
<rect width="700" height="500" fill="#ffffff"/>
<text x="350" y="30" fill="#111827" font-size="16" font-weight="600" text-anchor="middle">Offboard 启动流程时序图</text>
<rect x="60" y="60" width="200" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="160" y="90" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">启动发送 setpoint</text>
<rect x="60" y="160" width="200" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="160" y="190" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">等待心跳连接</text>
<rect x="60" y="260" width="200" height="50" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
<text x="160" y="290" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">切换 OFFBOARD 模式</text>
<rect x="60" y="360" width="200" height="50" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="160" y="390" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">解锁</text>
<rect x="60" y="460" width="200" height="50" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="160" y="490" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">起飞并悬停 5m</text>
<line x1="160" y1="110" x2="160" y2="160" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="160" y1="210" x2="160" y2="260" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="160" y1="310" x2="160" y2="360" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="160" y1="410" x2="160" y2="460" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="320" y="80" fill="#6b7280" font-size="12">→ 先发送 setpoint（20Hz）至少 1 秒，
否则 PX4 拒绝切换模式</text>
<text x="320" y="180" fill="#6b7280" font-size="12">→ 等待 mavros/state.connected = true</text>
<text x="320" y="280" fill="#6b7280" font-size="12">→ 通过 SetMode 服务设置
custom_mode = OFFBOARD</text>
<text x="320" y="380" fill="#6b7280" font-size="12">→ 必须在 Offboard 模式下解锁
或先解锁再切模式</text>
<text x="320" y="475" fill="#6b7280" font-size="12">→ setpoint 持续发送，
中断 0.5 秒会自动退出 Offboard</text>
<text x="5" y="45" fill="#6b7280" font-size="11" font-weight="600">Phase 1: 准备</text>
<text x="5" y="145" fill="#6b7280" font-size="11" font-weight="600">Phase 2: 连接</text>
<text x="5" y="245" fill="#6b7280" font-size="11" font-weight="600">Phase 3: 模式切换</text>
<text x="5" y="345" fill="#6b7280" font-size="11" font-weight="600">Phase 4: 解锁</text>
<text x="5" y="445" fill="#6b7280" font-size="11" font-weight="600">Phase 5: 飞行</text>
</svg>