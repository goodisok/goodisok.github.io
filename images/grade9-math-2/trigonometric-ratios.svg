<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
<style>text{font-family:"WenQuanYi Zen Hei","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}</style>
<rect width="720" height="420" fill="#ffffff"/>
<text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">锐角三角函数 — 特殊角的值</text>
<rect x="20" y="48" width="210" height="355" rx="8" fill="#eff6ff" stroke="#d1d5db" stroke-width="1"/>
<text x="125" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">30°−60°−90°</text>
<polygon points="180,280 76,280 76,220" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="2"/>
<rect x="76" y="275" width="5" height="5" fill="#2563eb"/>
<text x="190" y="285" font-size="12" font-weight="600" fill="#2563eb">30°</text>
<text x="64" y="218" font-size="12" font-weight="600" fill="#2563eb">60°</text>
<text x="128" y="295" font-size="12" font-weight="600" fill="#374151">√3</text>
<text x="60" y="252" font-size="12" font-weight="600" fill="#374151">1</text>
<text x="135" y="248" font-size="12" font-weight="700" fill="#dc2626">2</text>
<rect x="30" y="315" width="190" height="80" rx="6" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
<text x="125" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">sin30°=1/2</text>
<text x="125" y="355" text-anchor="middle" font-size="11" fill="#374151">cos30°=√3/2</text>
<text x="125" y="375" text-anchor="middle" font-size="11" fill="#2563eb">sin60°=√3/2</text>
<text x="125" y="390" text-anchor="middle" font-size="11" fill="#374151">cos60°=1/2</text>
<rect x="255" y="48" width="210" height="355" rx="8" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
<text x="360" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">45°−45°−90°</text>
<polygon points="410,280 306,280 306,176" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
<rect x="306" y="275" width="5" height="5" fill="#d97706"/>
<text x="318" y="300" font-size="12" font-weight="600" fill="#d97706">45°</text>
<text x="400" y="195" font-size="12" font-weight="600" fill="#d97706">45°</text>
<text x="358" y="295" font-size="12" font-weight="600" fill="#374151">1</text>
<text x="292" y="230" font-size="12" font-weight="600" fill="#374151">1</text>
<text x="370" y="225" font-size="12" font-weight="700" fill="#dc2626">√2</text>
<rect x="265" y="315" width="190" height="80" rx="6" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
<text x="360" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">sin45°=√2/2</text>
<text x="360" y="355" text-anchor="middle" font-size="11" fill="#374151">cos45°=√2/2</text>
<text x="360" y="375" text-anchor="middle" font-size="11" fill="#374151">tan45°=1</text>
<rect x="490" y="48" width="210" height="355" rx="8" fill="#f0f9ff" stroke="#d1d5db" stroke-width="1"/>
<text x="595" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">特殊角速记表</text>
<line x1="510" y1="90" x2="680" y2="90" stroke="#e5e7eb" stroke-width="1"/>
<text x="540" y="115" text-anchor="middle" font-size="11">角度</text><text x="595" y="115" text-anchor="middle" font-size="11">sin</text><text x="650" y="115" text-anchor="middle" font-size="11">cos</text>
<text x="540" y="140" text-anchor="middle" font-size="11">30°</text>
<text x="595" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">½</text>
<text x="650" y="140" text-anchor="middle" font-size="12">√3/2</text>
<text x="540" y="168" text-anchor="middle" font-size="11">45°</text>
<text x="595" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">√2/2</text>
<text x="650" y="168" text-anchor="middle" font-size="12">√2/2</text>
<text x="540" y="196" text-anchor="middle" font-size="11">60°</text>
<text x="595" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">√3/2</text>
<text x="650" y="196" text-anchor="middle" font-size="12">½</text>
<line x1="510" y1="220" x2="680" y2="220" stroke="#e5e7eb" stroke-width="1"/>
<text x="595" y="248" text-anchor="middle" font-size="11" fill="#dc2626">tan=sin/cos</text>
<text x="595" y="275" text-anchor="middle" font-size="11" fill="#374151">30°:tan=√3/3</text>
<text x="595" y="300" text-anchor="middle" font-size="11" fill="#374151">45°:tan=1</text>
<text x="595" y="325" text-anchor="middle" font-size="11" fill="#374151">60°:tan=√3</text>
</svg>