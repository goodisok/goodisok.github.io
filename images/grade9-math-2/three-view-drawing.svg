<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440">
<style>text{font-family:"WenQuanYi Zen Hei","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}</style>
<rect width="720" height="440" fill="#ffffff"/>
<text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">三视图 — 正四棱锥</text>
<polygon points="120,170 80,210 80,270 120,310 160,270 160,210" fill="#e5e7eb" stroke="#374151" stroke-width="1.5"/>
<polygon points="80,270 120,310 160,270 120,230" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="120" y1="170" x2="80" y2="270" stroke="#374151" stroke-width="1.5"/>
<line x1="120" y1="170" x2="160" y2="270" stroke="#374151" stroke-width="1.5"/>
<line x1="120" y1="170" x2="120" y2="310" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3"/>
<circle cx="120" cy="170" r="3" fill="#111827"/>
<text x="105" y="162" font-size="11" fill="#111827">V</text>
<text x="320" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">主视图(前面)</text>
<polygon points="260,280 380,280 320,190" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="2"/>
<text x="310" y="232" font-size="12" fill="#2563eb">3</text>
<text x="320" y="295" font-size="12" fill="#2563eb">4</text>
<line x1="320" y1="190" x2="320" y2="280" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,3"/>
<text x="490" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">俯视图(上面)</text>
<rect x="430" y="190" width="120" height="120" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
<line x1="430" y1="190" x2="550" y2="310" stroke="#d97706" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="550" y1="190" x2="430" y2="310" stroke="#d97706" stroke-width="1" stroke-dasharray="3,3"/>
<circle cx="490" cy="250" r="2" fill="#d97706"/>
<text x="490" y="265" text-anchor="middle" font-size="11" fill="#d97706">V</text>
<text x="645" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#db2777">左视图(左面)</text>
<polygon points="595,280 695,280 645,190" fill="#db2777" opacity="0.1" stroke="#db2777" stroke-width="2"/>
<text x="638" y="232" font-size="12" fill="#db2777">3</text>
<text x="645" y="295" font-size="12" fill="#db2777">4</text>
<line x1="645" y1="190" x2="645" y2="280" stroke="#db2777" stroke-width="1" stroke-dasharray="3,3"/>
<rect x="20" y="330" width="680" height="95" rx="8" fill="#f8fafc" stroke="#d1d5db" stroke-width="1.5"/>
<text x="360" y="355" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">三视图规律</text>
<text x="360" y="380" text-anchor="middle" font-size="12" fill="#374151">主俯长对正  |  主左高平齐  |  俯左宽相等</text>
<text x="360" y="405" text-anchor="middle" font-size="11" fill="#6b7280">长方体→三矩形  |  圆柱→矩·圆·矩  |  圆锥→三角·圆·三角  |  球→三圆</text>
</svg>