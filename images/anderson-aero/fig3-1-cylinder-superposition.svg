<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<style>text{font-family:'WenQuanYi Zen Hei','Droid Sans Fallback','Noto Sans CJK SC',sans-serif;}</style>
<defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
<marker id="arr2" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,8 2.5,0 5" fill="#dc2626"/></marker></defs>
<rect width="800" height="500" fill="#ffffff"/>
<text x="400" y="30" text-anchor="middle" fill="#111827" font-size="16" font-weight="600">圆柱绕流的叠加过程——升力的诞生</text>
<rect x="50" y="60" width="200" height="55" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
<text x="150" y="82" text-anchor="middle" fill="#16a34a" font-size="13" font-weight="600">均匀流 φ₁=V∞x</text>
<text x="150" y="60" text-anchor="middle" fill="#9ca3af" font-size="10">基本解①</text>
<rect x="300" y="60" width="200" height="55" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
<text x="400" y="82" text-anchor="middle" fill="#d97706" font-size="13" font-weight="600">偶极子 φ₂=μcosθ/2πr</text>
<text x="400" y="60" text-anchor="middle" fill="#9ca3af" font-size="10">基本解②</text>
<text x="250" y="85" fill="#2563eb" font-size="18" font-weight="600">+</text>
<text x="505" y="85" fill="#2563eb" font-size="18" font-weight="600">=</text>
<rect x="530" y="60" width="220" height="55" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
<text x="640" y="82" text-anchor="middle" fill="#0284c7" font-size="14" font-weight="600">对称圆柱绕流</text>
<line x1="150" y1="115" x2="150" y2="140" stroke="#2563eb" stroke-width="1" marker-end="url(#arr)"/>
<line x1="400" y1="115" x2="400" y2="140" stroke="#2563eb" stroke-width="1" marker-end="url(#arr)"/>
<rect x="80" y="145" width="140" height="50" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="150" y="168" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">对称压力分布</text>
<text x="150" y="185" text-anchor="middle" fill="#9ca3af" font-size="11">升力=0→达朗贝尔佯谬</text>
<line x1="270" y1="115" x2="350" y2="160" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr2)"/>
<text x="280" y="147" fill="#dc2626" font-size="11" font-weight="600">再加点涡</text>
<text x="280" y="110" fill="#dc2626" font-size="10">基本解③ φ₃=Γθ/2π</text>
<rect x="420" y="155" width="340" height="55" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
<text x="590" y="178" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="600">带环量的圆柱绕流</text>
<text x="590" y="196" text-anchor="middle" fill="#6b7280" font-size="11">Vθ=-2V∞sinθ-Γ/2πR</text>
<line x1="590" y1="210" x2="590" y2="240" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr2)"/>
<rect x="420" y="245" width="340" height="55" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
<text x="590" y="268" text-anchor="middle" fill="#d97706" font-size="14" font-weight="600">非对称压力分布→净升力</text>
<line x1="590" y1="300" x2="590" y2="330" stroke="#dc2626" stroke-width="2" marker-end="url(#arr2)"/>
<rect x="230" y="335" width="340" height="55" rx="20" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="2"/>
<text x="400" y="358" text-anchor="middle" fill="#b91c1c" font-size="16" font-weight="600">L' = ρV∞Γ 库塔-儒科夫斯基定理</text>
<rect x="60" y="415" width="680" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
<text x="400" y="435" text-anchor="middle" fill="#1d4ed8" font-size="12">库塔条件：尖后缘自动产生环量·保角变换将圆变为翼型</text>
</svg>