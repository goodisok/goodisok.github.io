<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380"><style>text{font-family:'WenQuanYi Zen Hei','Droid Sans Fallback','Noto Sans CJK SC',sans-serif;}</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker></defs>
<rect width="800" height="380" fill="#ffffff"/>
<text x="400" y="30" text-anchor="middle" fill="#111827" font-size="16" font-weight="600">薄翼理论的推导路径</text>
<rect x="60" y="60" width="200" height="50" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
<text x="160" y="83" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="600">涡面替代翼型</text>
<line x1="260" y1="85" x2="300" y2="85" stroke="#2563eb" stroke-width="2" marker-end="url(#a)"/>
<rect x="305" y="60" width="200" height="50" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
<text x="405" y="83" text-anchor="middle" fill="#0284c7" font-size="12" font-weight="600">壁面无穿透条件</text>
<line x1="505" y1="85" x2="540" y2="85" stroke="#2563eb" stroke-width="2" marker-end="url(#a)"/>
<rect x="545" y="60" width="200" height="50" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
<text x="645" y="83" text-anchor="middle" fill="#d97706" font-size="12" font-weight="600">核心积分方程</text>
<line x1="645" y1="110" x2="645" y2="140" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="520" y="145" width="250" height="50" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
<text x="645" y="168" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="600">傅里叶级数变换求解</text>
<line x1="645" y1="195" x2="645" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="120" y="230" width="250" height="50" rx="20" fill="#1d4ed8" opacity="0.08" stroke="#1d4ed8" stroke-width="2"/>
<text x="245" y="258" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="600">C₁ = 2π(α - αL=0)</text>
<rect x="430" y="230" width="250" height="50" rx="20" fill="#1d4ed8" opacity="0.08" stroke="#1d4ed8" stroke-width="2"/>
<text x="555" y="258" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="600">气动中心在c/4处</text>
<rect x="200" y="310" width="400" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
<text x="400" y="335" text-anchor="middle" fill="#1d4ed8" font-size="12">七条重要结论·小迎角下2π斜率精确成立</text>
</svg>