<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380"><style>text{font-family:'WenQuanYi Zen Hei','Droid Sans Fallback','Noto Sans CJK SC',sans-serif;}</style>
<rect width="800" height="380" fill="#ffffff"/>
<text x="400" y="30" text-anchor="middle" fill="#111827" font-size="16" font-weight="600">可压缩流知识体系</text>
<rect x="300" y="55" width="200" height="40" rx="20" fill="#1d4ed8"/>
<text x="400" y="81" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">可压缩流 (Ma&gt;0.3)</text>
<line x1="300" y1="95" x2="200" y2="130" stroke="#6b7280" stroke-width="1.5"/>
<line x1="400" y1="95" x2="400" y2="130" stroke="#6b7280" stroke-width="1.5"/>
<line x1="500" y1="95" x2="600" y2="130" stroke="#6b7280" stroke-width="1.5"/>
<rect x="60" y="135" width="200" height="70" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
<text x="160" y="158" text-anchor="middle" fill="#16a34a" font-size="13" font-weight="600">等熵关系</text>
<text x="160" y="178" text-anchor="middle" fill="#6b7280" font-size="10">p/ργ=const</text>
<text x="160" y="195" text-anchor="middle" fill="#6b7280" font-size="10">p₀/p=(1+(γ-1)Ma²/2)^(γ/(γ-1))</text>
<rect x="300" y="135" width="200" height="70" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
<text x="400" y="158" text-anchor="middle" fill="#d97706" font-size="13" font-weight="600">正激波</text>
<text x="400" y="178" text-anchor="middle" fill="#6b7280" font-size="10">Rankine-Hugoniot</text>
<text x="400" y="195" text-anchor="middle" fill="#6b7280" font-size="10">波前Ma&gt;1→波后Ma&lt;1</text>
<rect x="540" y="135" width="200" height="70" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
<text x="640" y="158" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="600">拉瓦尔喷管</text>
<text x="640" y="178" text-anchor="middle" fill="#6b7280" font-size="10">A/A*=f(Ma)</text>
<text x="640" y="195" text-anchor="middle" fill="#6b7280" font-size="10">Ma=1在喉部</text>
<rect x="60" y="250" width="680" height="80" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="400" y="273" text-anchor="middle" fill="#7c3aed" font-size="13" font-weight="600">应用链接</text>
<text x="160" y="298" fill="#6b7280" font-size="11">• 客机巡航Ma≈0.78-0.85→跨声速区→超临界翼型(第10讲)</text>
<text x="160" y="318" fill="#6b7280" font-size="11">• 涡扇发动机进气道→内激波系统→Ma减速到亚声速</text>
<text x="500" y="298" fill="#6b7280" font-size="11">• 超声速风洞→拉瓦尔喷管提供Ma&gt;1气流</text>
</svg>