<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<style>text{font-family:'WenQuanYi Zen Hei','Droid Sans Fallback','Noto Sans CJK SC',sans-serif;}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker></defs>
<rect width="800" height="500" fill="#ffffff"/>
<text x="400" y="35" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">流体运动三大守恒方程体系</text>
<rect x="60" y="60" width="200" height="60" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
<text x="160" y="84" text-anchor="middle" fill="#0284c7" font-size="14" font-weight="600">质量守恒</text><text x="160" y="104" text-anchor="middle" fill="#0369a1" font-size="12">质量不生不灭</text>
<rect x="300" y="60" width="200" height="60" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
<text x="400" y="84" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="600">动量守恒</text><text x="400" y="104" text-anchor="middle" fill="#15803d" font-size="12">牛顿第二定律</text>
<rect x="540" y="60" width="200" height="60" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
<text x="640" y="84" text-anchor="middle" fill="#d97706" font-size="14" font-weight="600">能量守恒</text><text x="640" y="104" text-anchor="middle" fill="#b45309" font-size="12">热力学第一定律</text>
<line x1="160" y1="120" x2="160" y2="150" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="400" y1="120" x2="400" y2="150" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="640" y1="120" x2="640" y2="150" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="60" y="155" width="200" height="60" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="160" y="179" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="600">连续方程</text><text x="160" y="199" text-anchor="middle" fill="#6b7280" font-size="11">ρ₁V₁A₁ = ρ₂V₂A₂</text>
<rect x="300" y="155" width="200" height="60" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="400" y="179" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="600">动量方程</text><text x="400" y="199" text-anchor="middle" fill="#6b7280" font-size="11">p + 1/2ρV² = const</text>
<rect x="540" y="155" width="200" height="60" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="640" y="179" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="600">能量方程</text><text x="640" y="199" text-anchor="middle" fill="#6b7280" font-size="11">p/ρ^γ = const</text>
<line x1="160" y1="215" x2="160" y2="250" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,3"/>
<line x1="400" y1="215" x2="400" y2="250" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,3"/>
<line x1="640" y1="215" x2="640" y2="250" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,3"/>
<rect x="60" y="255" width="200" height="55" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="160" y="277" text-anchor="middle" fill="#7c3aed" font-size="12" font-weight="600">可压缩性</text><text x="160" y="295" text-anchor="middle" fill="#6b7280" font-size="11">Ma数判断</text>
<rect x="300" y="255" width="200" height="55" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="400" y="277" text-anchor="middle" fill="#7c3aed" font-size="12" font-weight="600">黏性</text><text x="400" y="295" text-anchor="middle" fill="#6b7280" font-size="11">Re数判断</text>
<rect x="540" y="255" width="200" height="55" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="640" y="277" text-anchor="middle" fill="#7c3aed" font-size="12" font-weight="600">状态方程</text><text x="640" y="295" text-anchor="middle" fill="#6b7280" font-size="11">p = ρRT</text>
<rect x="200" y="350" width="400" height="50" rx="20" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="1"/>
<text x="400" y="375" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="600">4方程 + 边界条件 + 初始条件 = 完整描述</text>
<rect x="60" y="425" width="680" height="40" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="400" y="442" text-anchor="middle" fill="#374151" font-size="11">无黏无旋 → ∇²φ=0（拉普拉斯方程）→ 势流理论</text>
<text x="400" y="457" text-anchor="middle" fill="#374151" font-size="11">有黏 → Navier-Stokes方程 → 边界层理论</text>
</svg>