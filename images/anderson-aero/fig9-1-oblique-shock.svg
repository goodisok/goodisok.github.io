<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400"><style>text{font-family:'WenQuanYi Zen Hei','Droid Sans Fallback','Noto Sans CJK SC',sans-serif;}</style>
<defs><marker id="a" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,8 2.5,0 5" fill="#2563eb"/></marker></defs>
<rect width="800" height="400" fill="#ffffff"/>
<text x="400" y="30" text-anchor="middle" fill="#111827" font-size="16" font-weight="600">超声速流动中的激波与膨胀波</text>
<rect x="60" y="60" width="320" height="70" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
<text x="220" y="83" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="600">斜激波 Oblique Shock</text>
<text x="220" y="105" text-anchor="middle" fill="#6b7280" font-size="11">θ-β-Ma关系·法向正激波公式</text>
<rect x="420" y="60" width="320" height="70" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
<text x="580" y="83" text-anchor="middle" fill="#d97706" font-size="14" font-weight="600">膨胀波 Expansion Wave</text>
<text x="580" y="105" text-anchor="middle" fill="#6b7280" font-size="11">普朗特-迈耶函数ν(Ma)</text>
<line x1="60" y1="130" x2="60" y2="160" stroke="#6b7280" stroke-width="1"/>
<line x1="420" y1="130" x2="420" y2="160" stroke="#6b7280" stroke-width="1"/>
<rect x="60" y="165" width="320" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
<text x="220" y="188" text-anchor="middle" fill="#15803d" font-size="12">关键特性</text>
<text x="160" y="212" fill="#6b7280" font-size="11">• 弱激波解：波后仍为超声速</text>
<text x="160" y="230" fill="#6b7280" font-size="11">• 强激波解：波后变为亚声速</text>
<rect x="420" y="165" width="320" height="80" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
<text x="580" y="188" text-anchor="middle" fill="#c2410c" font-size="12">关键特性</text>
<text x="500" y="212" fill="#6b7280" font-size="11">• 凸角→膨胀波（加速+降压）</text>
<text x="500" y="230" fill="#6b7280" font-size="11">• ν(Ma)单调递增→膨胀越大Ma越高</text>
<rect x="60" y="280" width="680" height="80" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="400" y="303" text-anchor="middle" fill="#7c3aed" font-size="13" font-weight="600">锥型流与超声速机翼</text>
<text x="160" y="328" fill="#6b7280" font-size="11">• 锥型流(Taylor-Maccoll)：非均匀流场→与二维楔形体不同</text>
<text x="160" y="348" fill="#6b7280" font-size="11">• 超声速薄翼：Cl=4α/√(Ma²-1)，Cd=4α²/√(Ma²-1)+4(t/c)²/√(Ma²-1)</text>
</svg>