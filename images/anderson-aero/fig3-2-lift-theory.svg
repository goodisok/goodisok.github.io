<path d="M 600 215 L 600 255" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
<rect x="120" y="260" width="160" height="70" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
