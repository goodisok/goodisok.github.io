<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400"><style>text{font-family:'WenQuanYi Zen Hei','Droid Sans Fallback','Noto Sans CJK SC',sans-serif;}</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker></defs>
<rect width="800" height="400" fill="#ffffff"/>
<text x="400" y="30" text-anchor="middle" fill="#111827" font-size="16" font-weight="600">正激波关系式·Ma₂=2.0算例</text>
<rect x="60" y="60" width="200" height="90" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
<text x="160" y="85" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="600">波前 (upstream)</text>
<text x="160" y="108" text-anchor="middle" fill="#6b7280" font-size="12">Ma₁ = 2.0</text>
<text x="160" y="130" text-anchor="middle" fill="#6b7280" font-size="11">p₁, T₁, ρ₁ (超声速)</text>
<line x1="260" y1="105" x2="350" y2="105" stroke="#dc2626" stroke-width="3"/>
<text x="305" y="95" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="600">激波</text>
<rect x="360" y="60" width="200" height="90" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
<text x="460" y="85" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="600">波后 (downstream)</text>
<text x="460" y="108" text-anchor="middle" fill="#6b7280" font-size="12">Ma₂ = 0.577</text>
<text x="460" y="130" text-anchor="middle" fill="#6b7280" font-size="11">p₂=4.5p₁, ρ₂=2.67ρ₁, T₂=1.69T₁</text>
<rect x="620" y="60" width="140" height="90" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
<text x="690" y="85" text-anchor="middle" fill="#d97706" font-size="13" font-weight="600">物理</text>
<text x="690" y="108" text-anchor="middle" fill="#6b7280" font-size="11">熵↑不可逆</text>
<text x="690" y="130" text-anchor="middle" fill="#6b7280" font-size="11">激波耗散</text>
<rect x="60" y="190" width="680" height="70" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="400" y="213" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">正激波关系式</text>
<text x="160" y="238" fill="#6b7280" font-size="11">Ma₂² = ((γ-1)Ma₁²+2)/(2γMa₁²-(γ-1))</text>
<text x="500" y="238" fill="#6b7280" font-size="11">p₂/p₁ = 1+2γ(Ma₁²-1)/(γ+1)</text>
<rect x="60" y="290" width="680" height="60" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
<text x="400" y="312" text-anchor="middle" fill="#1d4ed8" font-size="12">可压缩流三支柱：等熵关系 + 正激波关系 + 拉瓦尔喷管(面积-马赫数)</text>
<text x="400" y="335" text-anchor="middle" fill="#6b7280" font-size="11">拉瓦尔喷管: 收敛段Ma&lt;1→喉部Ma=1→扩张段Ma&gt;1</text>
</svg>