<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
<style>text{font-family:'WenQuanYi Zen Hei','Droid Sans Fallback','Noto Sans CJK SC',sans-serif;}</style>
<defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker></defs>
<rect width="800" height="350" fill="#ffffff"/>
<text x="400" y="30" text-anchor="middle" fill="#111827" font-size="16" font-weight="600">从速度场到拉普拉斯方程——势流理论的推导路径</text>
<rect x="40" y="60" width="140" height="50" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
<text x="110" y="82" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="600">无旋流动</text>
<text x="110" y="100" text-anchor="middle" fill="#15803d" font-size="11">∇×V = 0</text>
<rect x="240" y="60" width="140" height="50" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
<text x="310" y="82" text-anchor="middle" fill="#0284c7" font-size="12" font-weight="600">速度势存在</text>
<text x="310" y="100" text-anchor="middle" fill="#0369a1" font-size="11">V = ∇φ</text>
<rect x="440" y="60" width="140" height="50" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
<text x="510" y="82" text-anchor="middle" fill="#d97706" font-size="12" font-weight="600">不可压缩</text>
<text x="510" y="100" text-anchor="middle" fill="#b45309" font-size="11">∇·V=0</text>
<rect x="620" y="60" width="150" height="50" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
<text x="695" y="82" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="600">拉普拉斯方程</text>
<text x="695" y="100" text-anchor="middle" fill="#b91c1c" font-size="11">∇²φ=0</text>
<line x1="180" y1="85" x2="235" y2="85" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
<line x1="380" y1="85" x2="435" y2="85" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
<line x1="580" y1="85" x2="615" y2="85" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
<rect x="60" y="150" width="680" height="70" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="400" y="172" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">两个简化路径</text>
<text x="160" y="196" fill="#6b7280" font-size="11">路径A: 速度势φ（要求无旋）→ ∇²φ=0</text>
<text x="500" y="196" fill="#6b7280" font-size="11">路径B: 流函数ψ（要求不可压缩）→ ∇²ψ=0</text>
<rect x="200" y="250" width="400" height="50" rx="20" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="1"/>
<text x="400" y="272" text-anchor="middle" fill="#1d4ed8" font-size="12">φ和ψ等价：已知一个就确定了全部流场</text>
</svg>