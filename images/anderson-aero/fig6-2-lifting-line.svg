<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380"><style>text{font-family:'WenQuanYi Zen Hei','Droid Sans Fallback','Noto Sans CJK SC',sans-serif;}</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker></defs>
<rect width="800" height="380" fill="#ffffff"/>
<text x="400" y="30" text-anchor="middle" fill="#111827" font-size="16" font-weight="600">升力线理论的核心公式</text>
<rect x="60" y="60" width="220" height="70" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
<text x="170" y="85" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="600">展弦比</text>
<text x="170" y="108" text-anchor="middle" fill="#6b7280" font-size="13">AR = b²/S</text>
<rect x="320" y="60" width="220" height="70" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
<text x="430" y="85" text-anchor="middle" fill="#0284c7" font-size="12" font-weight="600">椭圆翼升力系数</text>
<text x="430" y="108" text-anchor="middle" fill="#6b7280" font-size="13">CL = (2π·AR)/(AR+2)·α</text>
<rect x="580" y="60" width="170" height="70" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
<text x="665" y="85" text-anchor="middle" fill="#d97706" font-size="12" font-weight="600">诱导阻力</text>
<text x="665" y="108" text-anchor="middle" fill="#6b7280" font-size="11">CD,i = CL²/πAR</text>
<line x1="60" y1="130" x2="60" y2="160" stroke="#6b7280" stroke-width="1"/>
<line x1="320" y1="130" x2="320" y2="160" stroke="#6b7280" stroke-width="1"/>
<line x1="580" y1="130" x2="580" y2="160" stroke="#6b7280" stroke-width="1"/>
<rect x="60" y="165" width="220" height="50" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
<text x="170" y="187" text-anchor="middle" fill="#15803d" font-size="11">AR↑ → CL↑靠近二维值</text>
<text x="170" y="204" text-anchor="middle" fill="#9ca3af" font-size="10">AR=10时CL为二维的83%</text>
<rect x="320" y="165" width="220" height="50" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
<text x="430" y="187" text-anchor="middle" fill="#c2410c" font-size="11">AR↑ → CD,i↓</text>
<text x="430" y="204" text-anchor="middle" fill="#9ca3af" font-size="10">AR=20时CD,i仅为AR=4的1/5</text>
<rect x="580" y="165" width="170" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
<text x="665" y="187" text-anchor="middle" fill="#dc2626" font-size="11">非椭圆翼</text>
<text x="665" y="204" text-anchor="middle" fill="#9ca3af" font-size="10">CD,i=CL²/πeAR</text>
<rect x="60" y="255" width="680" height="80" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="400" y="278" text-anchor="middle" fill="#7c3aed" font-size="13" font-weight="600">工程含义</text>
<text x="160" y="302" fill="#6b7280" font-size="11">• 大展弦比→低诱导阻力→适合续航飞行</text>
<text x="500" y="302" fill="#6b7280" font-size="11">• 小展弦比→高诱导阻力→适合机动飞行</text>
<text x="160" y="322" fill="#6b7280" font-size="11">• 椭圆翼→理论最优（制造复杂），锥形翼是实用折中</text>
</svg>