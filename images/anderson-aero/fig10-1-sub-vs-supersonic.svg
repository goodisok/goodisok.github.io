<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420"><style>text{font-family:'WenQuanYi Zen Hei','Droid Sans Fallback','Noto Sans CJK SC',sans-serif;}</style>
<rect width="800" height="420" fill="#ffffff"/>
<text x="400" y="30" text-anchor="middle" fill="#111827" font-size="16" font-weight="600">亚声速翼型 vs 超声速翼型设计对比</text>
<rect x="30" y="60" width="150" height="35" rx="4" fill="#1d4ed8"/><text x="105" y="83" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">特性</text>
<rect x="185" y="60" width="190" height="35" rx="4" fill="#16a34a"/><text x="280" y="83" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">亚声速 (Ma&lt;0.7)</text>
<rect x="380" y="60" width="190" height="35" rx="4" fill="#dc2626"/><text x="475" y="83" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">超声速 (Ma&gt;1.2)</text>
<rect x="575" y="60" width="170" height="35" rx="4" fill="#d97706"/><text x="660" y="83" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">跨声速(Ma0.7-1.2)</text>
<rect x="30" y="100" width="150" height="35" fill="#f9fafb"/><text x="105" y="123" text-anchor="middle" fill="#374151" font-size="11">前缘形状</text>
<rect x="185" y="100" width="190" height="35" fill="#f9fafb"/><text x="280" y="123" text-anchor="middle" fill="#374151" font-size="11">圆弧形(半径有限)</text>
<rect x="380" y="100" width="190" height="35" fill="#f9fafb"/><text x="475" y="123" text-anchor="middle" fill="#374151" font-size="11">尖锐(半径很小)</text>
<rect x="575" y="100" width="170" height="35" fill="#f9fafb"/><text x="660" y="123" text-anchor="middle" fill="#374151" font-size="11">中等</text>
<rect x="30" y="140" width="150" height="35" fill="#ffffff"/><text x="105" y="163" text-anchor="middle" fill="#374151" font-size="11">相对厚度</text>
<rect x="185" y="140" width="190" height="35" fill="#ffffff"/><text x="280" y="163" text-anchor="middle" fill="#374151" font-size="11">8-15%</text>
<rect x="380" y="140" width="190" height="35" fill="#ffffff"/><text x="475" y="163" text-anchor="middle" fill="#374151" font-size="11">3-8% (薄)</text>
<rect x="575" y="140" width="170" height="35" fill="#ffffff"/><text x="660" y="163" text-anchor="middle" fill="#374151" font-size="11">中等</text>
<rect x="30" y="180" width="150" height="35" fill="#f9fafb"/><text x="105" y="203" text-anchor="middle" fill="#374151" font-size="11">弯度</text>
<rect x="185" y="180" width="190" height="35" fill="#f9fafb"/><text x="280" y="203" text-anchor="middle" fill="#374151" font-size="11">弯度提升性能</text>
<rect x="380" y="180" width="190" height="35" fill="#f9fafb"/><text x="475" y="203" text-anchor="middle" fill="#374151" font-size="11">弯度几乎无效</text>
<rect x="575" y="180" width="170" height="35" fill="#f9fafb"/><text x="660" y="203" text-anchor="middle" fill="#374151" font-size="11">有限</text>
<rect x="30" y="220" width="150" height="35" fill="#ffffff"/><text x="105" y="243" text-anchor="middle" fill="#374151" font-size="11">激波系统</text>
<rect x="185" y="220" width="190" height="35" fill="#ffffff"/><text x="280" y="243" text-anchor="middle" fill="#374151" font-size="11">无</text>
<rect x="380" y="220" width="190" height="35" fill="#ffffff"/><text x="475" y="243" text-anchor="middle" fill="#374151" font-size="11">前缘+后缘激波</text>
<rect x="575" y="220" width="170" height="35" fill="#ffffff"/><text x="660" y="243" text-anchor="middle" fill="#374151" font-size="11">上表面激波</text>
<rect x="30" y="260" width="150" height="35" fill="#f9fafb"/><text x="105" y="283" text-anchor="middle" fill="#374151" font-size="11">阻力主要来源</text>
<rect x="185" y="260" width="190" height="35" fill="#f9fafb"/><text x="280" y="283" text-anchor="middle" fill="#374151" font-size="11">摩擦阻力</text>
<rect x="380" y="260" width="190" height="35" fill="#f9fafb"/><text x="475" y="283" text-anchor="middle" fill="#374151" font-size="11">波阻(占主导)</text>
<rect x="575" y="260" width="170" height="35" fill="#f9fafb"/><text x="660" y="283" text-anchor="middle" fill="#374151" font-size="11">波阻+摩擦</text>
<rect x="30" y="300" width="150" height="35" fill="#ffffff"/><text x="105" y="323" text-anchor="middle" fill="#374151" font-size="11">升力线斜率</text>
<rect x="185" y="300" width="190" height="35" fill="#ffffff"/><text x="280" y="323" text-anchor="middle" fill="#374151" font-size="11">2π/grad(1-Ma²)</text>
<rect x="380" y="300" width="190" height="35" fill="#ffffff"/><text x="475" y="323" text-anchor="middle" fill="#374151" font-size="11">4/√(Ma²-1)</text>
<rect x="575" y="300" width="170" height="35" fill="#ffffff"/><text x="660" y="323" text-anchor="middle" fill="#374151" font-size="11">非线性</text>
<rect x="60" y="355" width="680" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
<text x="400" y="373" text-anchor="middle" fill="#1d4ed8" font-size="11">超临界翼型(Whitcomb)：上表面平坦→延迟激波→提高巡航Ma约0.04-0.06</text>
</svg>