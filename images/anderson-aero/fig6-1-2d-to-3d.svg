<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450"><style>text{font-family:'WenQuanYi Zen Hei','Droid Sans Fallback','Noto Sans CJK SC',sans-serif;}</style>
<defs><marker id="a" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,8 2.5,0 5" fill="#2563eb"/></marker></defs>
<rect width="800" height="450" fill="#ffffff"/>
<text x="400" y="30" text-anchor="middle" fill="#111827" font-size="16" font-weight="600">二维翼型→三维机翼：有限翼的三大效应</text>
<rect x="60" y="60" width="200" height="80" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
<text x="160" y="85" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="600">二维翼型</text>
<text x="160" y="105" text-anchor="middle" fill="#6b7280" font-size="11">Cl = 2πα</text>
<text x="160" y="122" text-anchor="middle" fill="#6b7280" font-size="11">无诱导阻力</text>
<line x1="260" y1="100" x2="310" y2="100" stroke="#dc2626" stroke-width="2" marker-end="url(#a)"/>
<rect x="320" y="60" width="200" height="80" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
<text x="420" y="85" text-anchor="middle" fill="#d97706" font-size="14" font-weight="600">翼尖涡形成</text>
<text x="420" y="105" text-anchor="middle" fill="#6b7280" font-size="11">下洗速度w出现</text>
<text x="420" y="122" text-anchor="middle" fill="#6b7280" font-size="11">诱导迎角αi</text>
<line x1="520" y1="100" x2="570" y2="100" stroke="#dc2626" stroke-width="2" marker-end="url(#a)"/>
<rect x="580" y="60" width="180" height="80" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
<text x="670" y="85" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="600">三维机翼</text>
<text x="670" y="105" text-anchor="middle" fill="#6b7280" font-size="11">CL = 二维值×(降级)</text>
<text x="670" y="122" text-anchor="middle" fill="#6b7280" font-size="11">诱导阻力出现</text>
<rect x="60" y="180" width="680" height="80" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="400" y="203" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">普朗特升力线理论的三条核心结论</text>
<text x="160" y="230" fill="#6b7280" font-size="11">① CL = a₀/(1+a₀/πAR)·α — 升力线斜率降低</text>
<text x="500" y="230" fill="#6b7280" font-size="11">② CD,i = CL²/πeAR — 诱导阻力</text>
<text x="160" y="250" fill="#6b7280" font-size="11">③ 椭圆翼(e=1)是最优，CD,i = CL²/πAR</text>
<rect x="200" y="290" width="400" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
<text x="400" y="313" text-anchor="middle" fill="#1d4ed8" font-size="12">展弦比AR=b²/S：越大→诱导阻力越低→续航越长</text>
<text x="400" y="332" text-anchor="middle" fill="#6b7280" font-size="11">滑翔机AR&gt;20，战斗机AR≈3-5，四旋翼臂AR≈1-3</text>
<rect x="100" y="370" width="600" height="50" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
<text x="400" y="392" text-anchor="middle" fill="#7c3aed" font-size="12">Oswald效率因子e：椭圆翼e=1，矩形翼e≈0.7-0.8，锥形翼e≈0.85-0.92</text>
</svg>