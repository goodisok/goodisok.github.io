<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220">
<style>text{font-family:"WenQuanYi Zen Hei","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}</style>
<rect width="780" height="220" fill="#ffffff"/>
<defs><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ea580c"/></marker></defs>
<line x1="50" y1="100" x2="750" y2="100" stroke="#374151" stroke-width="2"/>
<polygon points="750,100 740,95 740,105" fill="#374151"/>
<line x1="120" y1="90" x2="120" y2="110" stroke="#dc2626" stroke-width="2"/>
<text x="120" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">-4</text>
<line x1="190" y1="90" x2="190" y2="110" stroke="#dc2626" stroke-width="2"/>
<text x="190" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">-3</text>
<line x1="260" y1="90" x2="260" y2="110" stroke="#dc2626" stroke-width="2"/>
<text x="260" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">-2</text>
<line x1="330" y1="90" x2="330" y2="110" stroke="#dc2626" stroke-width="2"/>
<text x="330" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">-1</text>
<line x1="400" y1="90" x2="400" y2="110" stroke="#2563eb" stroke-width="2"/>
<text x="400" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">0</text>
<line x1="470" y1="90" x2="470" y2="110" stroke="#16a34a" stroke-width="2"/>
<text x="470" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#16a34a">1</text>
<line x1="540" y1="90" x2="540" y2="110" stroke="#16a34a" stroke-width="2"/>
<text x="540" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#16a34a">2</text>
<line x1="610" y1="90" x2="610" y2="110" stroke="#16a34a" stroke-width="2"/>
<text x="610" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#16a34a">3</text>
<line x1="680" y1="90" x2="680" y2="110" stroke="#16a34a" stroke-width="2"/>
<text x="680" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#16a34a">4</text>
<line x1="190" y1="55" x2="190" y2="98" stroke="#ea580c" stroke-width="2" marker-end="url(#a)"/>
<line x1="400" y1="55" x2="400" y2="98" stroke="#ea580c" stroke-width="2" marker-end="url(#a)"/>
<line x1="190" y1="55" x2="400" y2="55" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="295.0" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">|−3| = 3</text>
<line x1="190" y1="158" x2="610" y2="158" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="400" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">−3 和 3 互为相反数</text>
<rect x="124.0" y="155" width="170" height="30" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
<text x="209.0" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">负数（原点左侧）</text>
<text x="209.0" y="181" text-anchor="middle" font-size="10" fill="#6b7280">小于 0</text>
<rect x="525" y="155" width="170" height="30" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
<text x="610" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">正数（原点右侧）</text>
<text x="610" y="181" text-anchor="middle" font-size="10" fill="#6b7280">大于 0</text>
</svg>