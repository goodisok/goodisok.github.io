<circle cx="650" cy="321" r="3" fill="#dc2626"/>
<text x="660" y="325" font-size="11" fill="#374151">工况限制明确</text>
<rect x="670" y="460" width="200" height="36" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<text x="770" y="484" text-anchor="middle" font-size="14" font-weight="600" fill="#16a34a">最佳方案 ✓</text>
<rect x="80" y="530" width="800" height="50" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="480" y="550" text-anchor="middle" font-family="monospace" font-size="14" fill="#374151">F_total = F_physics  +  f_nn(s; θ)   |   |f_nn| ≪ |F_physics|   |   Lipschitz(f_nn) ≤ L  &lt; ∞</text>
<text x="480" y="570" text-anchor="middle" font-size="11" fill="#6b7280">正则化：∥f_nn∥² 最小化 → 能用方程就不用 NN → 只在必要时激活补正</text>
</svg>