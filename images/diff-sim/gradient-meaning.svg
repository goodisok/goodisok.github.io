<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
</style>
<defs>
  <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
  </marker>
</defs>

<rect width="960" height="500" fill="#ffffff"/>

<text x="480" y="35" fill="#111827" font-size="20" font-weight="600" text-anchor="middle">梯度的几何意义：指向函数值变化最快的方向</text>

<!-- 左侧：传统手动调参示意图（一个人在一维曲线上摸索） -->
<rect x="30" y="55" width="430" height="430" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
<text x="245" y="80" fill="#dc2626" font-size="16" font-weight="600" text-anchor="middle">❌ 传统手动调参：瞎摸</text>

<!-- 二次数值曲线 -->
<!-- 坐标轴 -->
<line x1="80" y1="180" x2="430" y2="180" stroke="#9ca3af" stroke-width="1.5"/>
<line x1="100" y1="60" x2="100" y2="440" stroke="#9ca3af" stroke-width="1.5"/>

<!-- 函数曲线 y = x²/100 + 80 -->
<path d="M 170 165 Q 255 100, 340 180 Q 380 220, 400 280" fill="none" stroke="#dc2626" stroke-width="2.5"/>

<!-- x轴标签 -->
<text x="100" y="460" fill="#6b7280" font-size="11" text-anchor="middle">C_T = 0.10</text>
<text x="170" y="460" fill="#6b7280" font-size="11" text-anchor="middle">C_T = 0.11</text>
<text x="255" y="460" fill="#6b7280" font-size="11" text-anchor="middle">C_T = 0.12</text>
<text x="340" y="460" fill="#6b7280" font-size="11" text-anchor="middle">C_T = 0.13</text>
<text x="400" y="460" fill="#6b7280" font-size="11" text-anchor="middle">C_T = 0.14</text>

<!-- y轴标签 -->
<text x="75" y="170" fill="#6b7280" font-size="11" text-anchor="end">误差小</text>
<text x="75" y="90" fill="#6b7280" font-size="11" text-anchor="end">误差大</text>

<!-- 探索点1（170, 165） -->
<circle cx="170" cy="165" r="6" fill="#dc2626"/>
<text x="170" y="155" fill="#dc2626" font-size="11" text-anchor="middle" font-weight="600">A</text>
<!-- 标注 -->
<line x1="170" y1="165" x2="260" y2="320" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3"/>
<text x="270" y="330" fill="#dc2626" font-size="11">😣 误差=7，太大了</text>
<text x="270" y="345" fill="#dc2626" font-size="11">改到 C_T=0.12 试试？</text>

<!-- 探索点2（255, 100） -->
<circle cx="255" cy="100" r="6" fill="#dc2626"/>
<!-- 标注 -->
<line x1="255" y1="100" x2="310" y2="120" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3"/>
<text x="310" y="120" fill="#dc2626" font-size="11">😤 还是偏，再改</text>

<!-- 探索点3（340, 180） -->
<circle cx="340" cy="180" r="6" fill="#dc2626"/>
<line x1="340" y1="180" x2="310" y2="210" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3"/>
<text x="310" y="215" fill="#dc2626" font-size="11">🤔 又大了，倒回来</text>

<!-- 问号标注 -->
<text x="450" y="240" fill="#dc2626" font-size="40" text-anchor="middle">?</text>
<text x="450" y="270" fill="#dc2626" font-size="13" text-anchor="middle">到底往哪调？</text>
<text x="450" y="290" fill="#dc2626" font-size="13" text-anchor="middle">猜 3 次还没找到</text>

<!-- ============= 右侧：可微 ============= -->
<rect x="500" y="55" width="430" height="430" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="715" y="80" fill="#16a34a" font-size="16" font-weight="600" text-anchor="middle">✅ 可微自动调参：有方向</text>

<!-- 同样曲线 -->
<line x1="550" y1="180" x2="900" y2="180" stroke="#9ca3af" stroke-width="1.5"/>
<line x1="570" y1="60" x2="570" y2="440" stroke="#9ca3af" stroke-width="1.5"/>

<path d="M 640 165 Q 725 100, 810 180 Q 850 220, 870 280" fill="none" stroke="#16a34a" stroke-width="2.5"/>

<!-- 只标记一点：梯度方向 -->
<circle cx="640" cy="165" r="6" fill="#16a34a"/>
<text x="640" y="155" fill="#16a34a" font-size="11" text-anchor="middle" font-weight="600">A</text>

<line x1="640" y1="165" x2="725" y2="100" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<text x="700" y="115" fill="#2563eb" font-size="11" font-weight="600">梯度方向 👉</text>
<text x="700" y="130" fill="#2563eb" font-size="11">C_T 应减小 0.003</text>

<!-- 绿色直接到谷底 -->
<circle cx="725" cy="100" r="6" fill="#16a34a"/>
<text x="725" y="95" fill="#16a34a" font-size="11" text-anchor="middle" font-weight="600">A'</text>

<!-- 底部结果对比 -->
<rect x="550" y="350" width="340" height="110" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="720" y="375" fill="#166534" font-size="14" font-weight="600" text-anchor="middle">📋 结果对比</text>

<line x1="570" y1="385" x2="870" y2="385" stroke="#86efac" stroke-width="1"/>

<text x="570" y="405" fill="#166534" font-size="12">传统手动调参：猜了 3 次，误差仍然很大</text>
<text x="570" y="425" fill="#166534" font-size="12">可微自动调参：1 步找到方向，直接收敛</text>
<text x="570" y="445" fill="#166534" font-size="12">效率差距：3+ 次 → 1 次</text>

</svg>