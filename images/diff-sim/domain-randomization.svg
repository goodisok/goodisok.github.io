<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
</style>
<defs>
  <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
  </marker>
</defs>

<rect width="960" height="460" fill="#ffffff"/>
<text x="480" y="30" fill="#111827" font-size="18" font-weight="600" text-anchor="middle">域随机化：不猜一个值，让参数在范围里随机变化</text>
<text x="480" y="50" fill="#6b7280" font-size="13" text-anchor="middle">只要你的算法在"最差情况"下也能工作，它就自然适用于真机</text>

<!-- ====== 上半：传统做法 ====== -->
<rect x="30" y="65" width="440" height="180" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
<text x="250" y="90" fill="#dc2626" font-size="16" font-weight="600" text-anchor="middle">❌ 传统做法：猜一个值</text>

<rect x="55" y="105" width="120" height="40" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="115" y="130" fill="#111827" font-size="13" font-weight="600" text-anchor="middle">你猜</text>

<line x1="175" y1="125" x2="220" y2="125" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>

<rect x="220" y="105" width="120" height="40" rx="6" fill="#fee2e2" stroke="#fecaca" stroke-width="1.5"/>
<text x="280" y="130" fill="#dc2626" font-size="13" font-weight="600" text-anchor="middle">C_T = 0.11</text>

<line x1="340" y1="125" x2="400" y2="125" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>

<rect x="400" y="105" width="55" height="40" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="427" y="130" fill="#16a34a" font-size="13" font-weight="600" text-anchor="middle">跑</text>

<!-- 结果 -->
<rect x="55" y="160" width="395" height="65" rx="6" fill="#ffedd5" stroke="#fed7aa" stroke-width="1.5"/>
<text x="252" y="182" fill="#c2410c" font-size="12" font-weight="600" text-anchor="middle">⚠️ 潜在风险</text>
<text x="65" y="200" fill="#c2410c" font-size="11">• 真机的 C_T = 0.13（你猜的是 0.11）→ 推力不准 → 拦截失败</text>
<text x="65" y="215" fill="#c2410c" font-size="11">• 猜对了吗？不知道。只能上真机试，一失手就炸机。</text>

<!-- ====== 下半：域随机化 ====== -->
<rect x="30" y="260" width="440" height="180" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="250" y="285" fill="#16a34a" font-size="16" font-weight="600" text-anchor="middle">✅ 域随机化：给个范围</text>

<rect x="55" y="300" width="120" height="40" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="115" y="325" fill="#111827" font-size="13" font-weight="600" text-anchor="middle">你给范围</text>

<line x1="175" y1="320" x2="220" y2="320" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<rect x="220" y="300" width="120" height="40" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="280" y="325" fill="#16a34a" font-size="13" font-weight="600" text-anchor="middle">C_T ∈ [0.08 ~ 0.16]</text>

<line x1="340" y1="320" x2="400" y2="320" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<rect x="400" y="300" width="55" height="40" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="427" y="325" fill="#16a34a" font-size="13" font-weight="600" text-anchor="middle">跑1000次</text>

<rect x="55" y="350" width="395" height="75" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="252" y="372" fill="#166534" font-size="12" font-weight="600" text-anchor="middle">✅ 结果：找到鲁棒参数</text>
<text x="65" y="390" fill="#166534" font-size="11">• 仿真中 C_T 在 0.08~0.16 之间每一次都能成功拦截</text>
<text x="65" y="408" fill="#166534" font-size="11">• 真机的 C_T 只要落在这个范围内 → 算法自然有效 → 不用猜了</text>

<!-- ====== 右侧：图示 ====== -->
<rect x="500" y="65" width="430" height="375" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="715" y="90" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">参数范围示意</text>

<!-- 单值 -->
<rect x="520" y="100" width="390" height="50" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
<text x="525" y="118" fill="#dc2626" font-size="11" font-weight="600">传统做法</text>
<text x="525" y="135" fill="#dc2626" font-size="11">仿真只用 C_T = 0.11</text>

<line x1="530" y1="128" x2="520" y2="128" stroke="#d1d5db" stroke-width="1"/>
<!-- 小标记 -->
<line x1="530" y1="120" x2="530" y2="136" stroke="#9ca3af" stroke-width="1"/>
<line x1="630" y1="120" x2="630" y2="136" stroke="#9ca3af" stroke-width="1"/>
<line x1="730" y1="120" x2="730" y2="136" stroke="#9ca3af" stroke-width="1"/>
<line x1="830" y1="120" x2="830" y2="136" stroke="#9ca3af" stroke-width="1"/>

<!-- 标记 C_T 位置 -->
<circle cx="650" cy="128" r="6" fill="#dc2626"/>
<line x1="650" y1="128" x2="650" y2="155" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3"/>
<text x="650" y="168" fill="#dc2626" font-size="11" font-weight="600" text-anchor="middle">C_T=0.11</text>

<!-- 真机实际 -->
<circle cx="730" cy="128" r="6" fill="#f59e0b"/>
<line x1="730" y1="128" x2="730" y2="155" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
<text x="730" y="168" fill="#f59e0b" font-size="11" font-weight="600" text-anchor="middle">真机实际=0.13</text>

<text x="520" y="195" fill="#dc2626" font-size="11">❌ 猜错了！仿真和真机对不上</text>

<!-- 范围 -->
<rect x="520" y="210" width="390" height="95" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
<text x="525" y="230" fill="#16a34a" font-size="11" font-weight="600">域随机化</text>
<text x="525" y="245" fill="#16a34a" font-size="11">C_T 在 0.08~0.16 之间随机</text>

<!-- 范围条 -->
<rect x="530" y="260" width="360" height="16" rx="8" fill="#dbeafe"/>
<line x1="530" y1="268" x2="890" y2="268" stroke="#93c5fd" stroke-width="2"/>

<!-- 范围端点 -->
<text x="530" y="288" fill="#2563eb" font-size="10" text-anchor="middle">0.08</text>
<text x="890" y="288" fill="#2563eb" font-size="10" text-anchor="middle">0.16</text>

<!-- 仿真随机点 -->
<circle cx="560" cy="268" r="3" fill="#16a34a"/>
<circle cx="610" cy="268" r="3" fill="#16a34a"/>
<circle cx="660" cy="268" r="3" fill="#16a34a"/>
<circle cx="700" cy="268" r="3" fill="#16a34a"/>
<circle cx="740" cy="268" r="3" fill="#16a34a"/>
<circle cx="780" cy="268" r="3" fill="#16a34a"/>
<circle cx="830" cy="268" r="3" fill="#16a34a"/>
<circle cx="860" cy="268" r="3" fill="#16a34a"/>

<!-- 真机值落在范围内 -->
<circle cx="730" cy="268" r="6" fill="#f59e0b" stroke="#16a34a" stroke-width="2"/>
<text x="730" y="305" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">✅ 真机 C_T=0.13 落在范围内</text>
<text x="730" y="323" fill="#16a34a" font-size="12" text-anchor="middle">仿真已覆盖 → 算法自动生效</text>

</svg>