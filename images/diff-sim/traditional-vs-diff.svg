<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
  </marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
  </marker>
  <linearGradient id="g-traditional" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fef2f2"/>
    <stop offset="100%" stop-color="#fff"/>
  </linearGradient>
  <linearGradient id="g-diff" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f0fdf4"/>
    <stop offset="100%" stop-color="#fff"/>
  </linearGradient>
</defs>

<rect width="960" height="520" fill="#ffffff"/>

<!-- 标题 -->
<text x="480" y="40" fill="#111827" font-size="20" font-weight="600" text-anchor="middle">传统仿真 vs 可微仿真：一维计算 vs 带方向感的计算</text>

<!-- =========== 上半部分：传统仿真 =========== -->
<rect x="40" y="60" width="880" height="205" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>

<!-- 左列：输入参数 -->
<rect x="65" y="85" width="160" height="50" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="145" y="107" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">输入参数</text>
<text x="145" y="125" fill="#6b7280" font-size="11" text-anchor="middle">C_T, C_D, I_xx, N</text>

<!-- 箭头 -->
<line x1="225" y1="110" x2="290" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 中间：仿真引擎（传统） -->
<rect x="290" y="85" width="200" height="50" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="390" y="107" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">传统仿真引擎</text>
<text x="390" y="125" fill="#6b7280" font-size="11" text-anchor="middle">🧊 前向计算，无梯度</text>

<!-- 箭头 -->
<line x1="490" y1="110" x2="555" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 右列：输出结果 -->
<rect x="555" y="85" width="160" height="50" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="635" y="107" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">轨迹结果</text>
<text x="635" y="125" fill="#6b7280" font-size="11" text-anchor="middle">只看得到位置变化</text>

<!-- 右下：人眼对比 -->
<rect x="740" y="85" width="155" height="50" rx="6" fill="#fee2e2" stroke="#fecaca" stroke-width="1.5"/>
<text x="817" y="107" fill="#dc2626" font-size="14" font-weight="600" text-anchor="middle">🙋 手动调参</text>
<text x="817" y="125" fill="#b91c1c" font-size="11" text-anchor="middle">猜→试→再猜→再试</text>

<line x1="715" y1="110" x2="740" y2="110" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>

<!-- 调参循环箭头（图上方的弧形回路） -->
<path d="M 145 80 C 145 55, 635 55, 635 80" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
<text x="390" y="62" fill="#dc2626" font-size="12" text-anchor="middle">🔁 每次改参数都要重跑仿真，反复试错</text>

<!-- 分隔线 -->
<line x1="40" y1="270" x2="920" y2="270" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

<!-- =========== 下半部分：可微仿真 =========== -->
<rect x="40" y="285" width="880" height="225" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>

<!-- 左列：输入参数 -->
<rect x="65" y="315" width="160" height="50" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="145" y="337" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">输入参数</text>
<text x="145" y="355" fill="#6b7280" font-size="11" text-anchor="middle">C_T, C_D, I_xx, N</text>

<!-- 箭头 -->
<line x1="225" y1="340" x2="290" y2="340" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 中间：可微仿真引擎 -->
<rect x="290" y="315" width="200" height="50" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="390" y="337" fill="#166534" font-size="14" font-weight="600" text-anchor="middle">可微仿真引擎</text>
<text x="390" y="355" fill="#16a34a" font-size="11" text-anchor="middle">⚡ 前向计算 + 梯度反向传播</text>

<!-- 箭头 -->
<line x1="490" y1="325" x2="555" y2="325" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 右列上：轨迹结果 -->
<rect x="555" y="315" width="160" height="50" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="635" y="337" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">轨迹结果</text>
<text x="635" y="355" fill="#6b7280" font-size="11" text-anchor="middle">位置、速度、姿态</text>

<!-- 右列下：梯度输出 -->
<rect x="555" y="380" width="160" height="50" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
<text x="635" y="402" fill="#166534" font-size="14" font-weight="600" text-anchor="middle">📊 梯度信息</text>
<text x="635" y="420" fill="#16a34a" font-size="11" text-anchor="middle">∂轨迹/∂C_T = ?</text>

<line x1="490" y1="365" x2="555" y2="405" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<!-- 右下：自动优化 -->
<rect x="740" y="340" width="155" height="50" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="817" y="362" fill="#166534" font-size="14" font-weight="600" text-anchor="middle">🤖 自动调参</text>
<text x="817" y="380" fill="#16a34a" font-size="11" text-anchor="middle">梯度告诉你往哪调</text>

<line x1="715" y1="365" x2="740" y2="365" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<!-- 自动调参循环箭头 -->
<path d="M 145 305 C 145 275, 635 275, 635 305" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
<text x="390" y="290" fill="#16a34a" font-size="12" text-anchor="middle">✅ 一次计算就知道方向，不再盲目试错</text>

<!-- 传参闭环：梯度→更新参数 -->
<path d="M 817 390 L 817 480 L 145 480 L 145 370" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
<text x="480" y="500" fill="#16a34a" font-size="12" text-anchor="middle">参数自动更新：C_T 应增加 0.003，N 应减小 0.5</text>

</svg>