<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650">
<style>
  text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
</style>
<defs>
  <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
  <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  <filter id="ds"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/></filter>
</defs>
<rect width="960" height="650" fill="#ffffff"/>
<text x="480" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">OSTrack 核心创新：双流架构 → 单流架构</text>
<text x="220" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">传统双流架构（Siamese）</text>
<rect x="70" y="100" width="140" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#ds)"/>
<text x="140.0" y="130.0" text-anchor="middle" font-size="14" fill="#991b1b">模板帧</text>
<rect x="230" y="100" width="140" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#ds)"/>
<text x="300.0" y="130.0" text-anchor="middle" font-size="14" fill="#991b1b">搜索帧</text>
<rect x="70" y="200" width="140" height="60" rx="6" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" filter="url(#ds)"/>
<text x="140.0" y="235.0" text-anchor="middle" font-size="14" fill="#991b1b">模板 Encoder</text>
<rect x="230" y="200" width="140" height="60" rx="6" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" filter="url(#ds)"/>
<text x="300.0" y="235.0" text-anchor="middle" font-size="14" fill="#991b1b">搜索 Encoder</text>
<rect x="120" y="310" width="200" height="55" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#ds)"/>
<text x="220.0" y="342.5" text-anchor="middle" font-size="14" fill="#991b1b">交叉注意力层</text>
<rect x="120" y="420" width="200" height="50" rx="6" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" filter="url(#ds)"/>
<text x="220.0" y="450.0" text-anchor="middle" font-size="14" fill="#991b1b">预测头</text>
<rect x="120" y="510" width="200" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#ds)"/>
<text x="220.0" y="535.0" text-anchor="middle" font-size="14" fill="#991b1b">BBox 输出</text>
<line x1="140" y1="150" x2="140" y2="200" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="300" y1="150" x2="300" y2="200" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="140" y1="260" x2="140" y2="310" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="300" y1="260" x2="220" y2="310" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="220" y1="365" x2="220" y2="420" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="220" y1="475" x2="220" y2="510" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="220" y="290" text-anchor="middle" font-size="12" fill="#9ca3af">⛔ 无早期交互</text>
<text x="220" y="565" text-anchor="middle" font-size="11" fill="#6b7280">两路独立编码 → 最后才交叉</text>
<text x="680" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">OSTrack 单流架构</text>
<rect x="540" y="100" width="120" height="50" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#ds)"/>
<text x="600.0" y="130.0" text-anchor="middle" font-size="14" fill="#1e40af">模板 128×128</text>
<rect x="700" y="100" width="120" height="50" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#ds)"/>
<text x="760.0" y="130.0" text-anchor="middle" font-size="14" fill="#1e40af">搜索 256×256</text>
<rect x="540" y="210" width="280" height="65" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5" filter="url(#ds)"/>
<text x="680.0" y="247.5" text-anchor="middle" font-size="14" fill="#1e40af">拼接 + ViT Encoder ×12层</text>
<rect x="540" y="330" width="280" height="50" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#ds)"/>
<text x="680.0" y="360.0" text-anchor="middle" font-size="14" fill="#1e40af">候选消除</text>
<rect x="540" y="430" width="280" height="50" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5" filter="url(#ds)"/>
<text x="680.0" y="460.0" text-anchor="middle" font-size="14" fill="#1e40af">预测头</text>
<rect x="540" y="520" width="280" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#ds)"/>
<text x="680.0" y="545.0" text-anchor="middle" font-size="14" fill="#1e40af">BBox + Confidence</text>
<text x="540" y="198" font-size="9" fill="#3b82f6">模板⇔搜索 早期交互</text>
<line x1="600" y1="150" x2="600" y2="210" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
<line x1="760" y1="150" x2="730" y2="210" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
<line x1="680" y1="275" x2="680" y2="330" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
<line x1="680" y1="380" x2="680" y2="430" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
<line x1="680" y1="480" x2="680" y2="520" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
<text x="680" y="295" text-anchor="middle" font-size="12" fill="#059669">✅ 第1层起全局 self-attention</text>
<text x="680" y="565" text-anchor="middle" font-size="11" fill="#6b7280">拼成一个序列 → 一路到底</text>
<line x1="455" y1="50" x2="455" y2="590" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="6,4"/>
<text x="455" y="620" text-anchor="middle" font-size="13" fill="#6b7280">两种架构对比</text>
</svg>