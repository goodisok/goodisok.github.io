<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
<style>
  text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
</style>
<defs>
  <marker id="ar2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  <marker id="ab2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
  <filter id="ds"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
</defs>
<rect width="960" height="520" fill="#ffffff"/>
<text x="480" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">传统模块化架构 vs VLA 端到端架构</text>
<text x="220" y="65" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">传统模块化堆栈</text>
<rect x="60" y="90" width="320" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#ds)"/>
<text x="220.0" y="120.0" text-anchor="middle" font-size="13" fill="#991b1b">感知模块（CV 模型：检测/分割/跟踪）</text>
<rect x="60" y="160" width="320" height="50" rx="6" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" filter="url(#ds)"/>
<text x="220.0" y="190.0" text-anchor="middle" font-size="13" fill="#991b1b">规划模块（路径规划/行为决策）</text>
<rect x="60" y="230" width="320" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#ds)"/>
<text x="220.0" y="260.0" text-anchor="middle" font-size="13" fill="#991b1b">控制模块（PID / MPC）</text>
<rect x="60" y="300" width="320" height="50" rx="6" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" filter="url(#ds)"/>
<text x="220.0" y="330.0" text-anchor="middle" font-size="13" fill="#991b1b">执行器（电机/方向盘）</text>
<line x1="220" y1="140" x2="220" y2="160" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar2)"/>
<line x1="220" y1="210" x2="220" y2="230" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar2)"/>
<line x1="220" y1="280" x2="220" y2="300" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar2)"/>
<text x="370" y="150" font-size="10" fill="#dc2626">检测框</text>
<text x="370" y="220" font-size="10" fill="#dc2626">轨迹点</text>
<text x="370" y="290" font-size="10" fill="#dc2626">PWM信号</text>
<text x="220" y="390" text-anchor="middle" font-size="12" fill="#ef4444">⚠️ 信息瓶颈 + 误差累积</text>
<text x="720" y="65" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">VLA 端到端</text>
<rect x="540" y="90" width="360" height="200" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5" filter="url(#ds)"/>
<text x="720" y="180" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e40af">VLA</text>
<text x="720" y="210" text-anchor="middle" font-size="14" fill="#3b82f6">摄像头输入 → 动作输出</text>
<text x="720" y="235" text-anchor="middle" font-size="12" fill="#60a5fa">端到端梯度，无中间抽象</text>
<rect x="640" y="330" width="160" height="50" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#ds)"/>
<text x="720" y="360" text-anchor="middle" font-size="14" fill="#1e40af">电机控制</text>
<line x1="720" y1="290" x2="720" y2="330" stroke="#2563eb" stroke-width="2" marker-end="url(#ab2)"/>
<text x="720" y="420" text-anchor="middle" font-size="12" fill="#059669">✅ 无信息瓶颈 · 无误差累积</text>
<line x1="455" y1="40" x2="455" y2="450" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="6,4"/>
<text x="220" y="450" text-anchor="middle" font-size="11" fill="#9ca3af">各模块独立开发、独立优化</text>
<text x="720" y="470" text-anchor="middle" font-size="11" fill="#9ca3af">联合优化，梯度直通</text>
</svg>