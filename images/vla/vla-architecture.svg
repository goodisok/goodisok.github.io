<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
<style>
  text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
</style>
<defs>
  <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
  <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  <marker id="a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#059669"/></marker>
  <filter id="ds"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
</defs>
<rect width="960" height="600" fill="#ffffff"/>
<text x="480" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">VLA（Vision-Language-Action）模型架构</text>
<rect x="80" y="60" width="200" height="60" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#ds)"/>
<text x="180.0" y="95.0" text-anchor="middle" font-size="14" fill="#1e40af">📷 Vision（摄像头）</text>
<rect x="380" y="60" width="200" height="60" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#ds)"/>
<text x="480.0" y="95.0" text-anchor="middle" font-size="14" fill="#5b21b6">📝 Language（指令）</text>
<rect x="680" y="60" width="200" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#ds)"/>
<text x="780.0" y="95.0" text-anchor="middle" font-size="14" fill="#166534">🎯 Action（动作序列）</text>
<rect x="80" y="170" width="200" height="50" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5" filter="url(#ds)"/>
<text x="180" y="200" text-anchor="middle" font-size="13" fill="#1e40af">ViT Patch Embedding</text>
<line x1="180" y1="120" x2="180" y2="170" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a1)"/>
<rect x="380" y="170" width="200" height="50" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5" filter="url(#ds)"/>
<text x="480" y="200" text-anchor="middle" font-size="13" fill="#5b21b6">Text Tokenizer</text>
<line x1="480" y1="120" x2="480" y2="170" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#a2)"/>
<rect x="680" y="170" width="200" height="50" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5" filter="url(#ds)"/>
<text x="780" y="200" text-anchor="middle" font-size="13" fill="#166534">Action Discretizer</text>
<line x1="780" y1="120" x2="780" y2="170" stroke="#059669" stroke-width="1.5" marker-end="url(#a3)"/>
<rect x="200" y="270" width="560" height="70" rx="10" fill="#1e40af" stroke="#1e3a8a" stroke-width="2" filter="url(#ds)"/>
<text x="480" y="300" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Transformer（共享 Backbone）</text>
<text x="480" y="323" text-anchor="middle" font-size="12" fill="#bfdbfe">视觉 Token + 文本 Token + 动作 Token → 联合 Self-Attention</text>
<line x1="180" y1="220" x2="300" y2="270" stroke="#2563eb" stroke-width="1.2"/>
<line x1="480" y1="220" x2="480" y2="270" stroke="#7c3aed" stroke-width="1.2"/>
<line x1="780" y1="220" x2="660" y2="270" stroke="#059669" stroke-width="1.2"/>
<rect x="200" y="400" width="560" height="55" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5" filter="url(#ds)"/>
<text x="480" y="425" text-anchor="middle" font-size="15" fill="#1e40af">动作 Token 序列 → 反离散化</text>
<text x="480" y="445" text-anchor="middle" font-size="11" fill="#6b7280">[action_125, action_100, action_128, ...] → 关节角度 / 方向盘转角</text>
<line x1="480" y1="340" x2="480" y2="400" stroke="#2563eb" stroke-width="2" marker-end="url(#a1)"/>
<rect x="300" y="500" width="360" height="50" rx="8" fill="#059669" stroke="#047857" stroke-width="1.5" filter="url(#ds)"/>
<text x="480" y="530" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">🤖 机器人执行动作</text>
<line x1="480" y1="455" x2="480" y2="500" stroke="#2563eb" stroke-width="2" marker-end="url(#a1)"/>
</svg>