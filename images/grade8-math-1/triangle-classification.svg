<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
<style>text{font-family:"WenQuanYi Zen Hei","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}</style>
<rect width="720" height="420" fill="#ffffff"/>
<text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">三角形的分类</text>
<text x="360" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">按 角 分 类</text>
<polygon points="130,155 100,100 180,110" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
<text x="140" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">锐角三角形</text>
<text x="140" y="192" text-anchor="middle" font-size="11" fill="#6b7280">三个角都 &lt; 90°</text>
<polygon points="350,155 285,100 350,100" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="2"/>
<rect x="345" y="100" width="5" height="5" fill="#2563eb"/>
<text x="318" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">直角三角形</text>
<text x="318" y="192" text-anchor="middle" font-size="11" fill="#6b7280">一个角 = 90°</text>
<polygon points="560,155 490,105 615,102" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="2"/>
<text x="560" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">钝角三角形</text>
<text x="560" y="192" text-anchor="middle" font-size="11" fill="#6b7280">一个角 &gt; 90°</text>
<line x1="60" y1="215" x2="660" y2="215" stroke="#e5e7eb" stroke-width="1"/>
<text x="360" y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">按 边 分 类</text>
<polygon points="130,325 90,265 185,265" fill="#ea580c" opacity="0.1" stroke="#ea580c" stroke-width="2"/>
<text x="138" y="345" text-anchor="middle" font-size="13" font-weight="600" fill="#ea580c">不等边三角形</text>
<text x="138" y="362" text-anchor="middle" font-size="11" fill="#6b7280">三边各不相等</text>
<polygon points="365,260 330,325 400,325" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="2"/>
<line x1="348" y1="298" x2="382" y2="298" stroke="#7c3aed" stroke-width="1.2"/>
<line x1="344" y1="304" x2="386" y2="304" stroke="#7c3aed" stroke-width="1.2"/>
<text x="365" y="345" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">等腰三角形</text>
<text x="365" y="362" text-anchor="middle" font-size="11" fill="#6b7280">有两条边相等</text>
<polygon points="570,260 540,320 600,320" fill="#0891b2" opacity="0.1" stroke="#0891b2" stroke-width="2"/>
<line x1="555" y1="290" x2="585" y2="290" stroke="#0891b2" stroke-width="1.2"/>
<line x1="552" y1="297" x2="588" y2="297" stroke="#0891b2" stroke-width="1.2"/>
<line x1="548" y1="282" x2="572" y2="318" stroke="#0891b2" stroke-width="1.2"/>
<text x="570" y="345" text-anchor="middle" font-size="13" font-weight="600" fill="#0891b2">等边三角形</text>
<text x="570" y="362" text-anchor="middle" font-size="11" fill="#6b7280">三条边都相等</text>
<rect x="60" y="385" width="600" height="28" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
<text x="360" y="403" text-anchor="middle" font-size="12" fill="#374151">三角形内角和 = 180°  |  外角 = 不相邻两内角之和  |  两边之和 &gt; 第三边</text>
</svg>