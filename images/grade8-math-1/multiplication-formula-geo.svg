<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500">
<style>text{font-family:"WenQuanYi Zen Hei","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}</style>
<rect width="720" height="500" fill="#ffffff"/>
<text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">乘法公式的几何解释</text>
<rect x="20" y="48" width="215" height="435" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<text x="127" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">(a+b)² 完全平方</text>
<rect x="47" y="90" width="160" height="160" fill="#16a34a" opacity="0.07" stroke="#16a34a" stroke-width="1.5"/>
<line x1="127" y1="90" x2="127" y2="250" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="47" y1="170" x2="207" y2="170" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
<text x="87" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">a²</text>
<text x="167" y="145" text-anchor="middle" font-size="13" fill="#059669">ab</text>
<text x="87" y="230" text-anchor="middle" font-size="13" fill="#059669">ab</text>
<text x="167" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">b²</text>
<text x="62" y="85" font-size="11" fill="#6b7280">a</text>
<text x="182" y="85" font-size="11" fill="#6b7280">b</text>
<text x="37" y="135" font-size="11" fill="#6b7280">a</text>
<text x="37" y="215" font-size="11" fill="#6b7280">b</text>
<text x="127" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">(a+b)²=a²+2ab+b²</text>
<line x1="40" y1="295" x2="215" y2="295" stroke="#e5e7eb" stroke-width="1"/>
<text x="127" y="318" text-anchor="middle" font-size="11" fill="#374151">例: (x+3)²</text>
<text x="127" y="338" text-anchor="middle" font-size="11" fill="#6b7280">=x²+2·x·3+3²=x²+6x+9</text>
<text x="127" y="365" text-anchor="middle" font-size="11" fill="#374151">因式分解:</text>
<text x="127" y="385" text-anchor="middle" font-size="11" fill="#16a34a">a²+2ab+b²=(a+b)²</text>
<rect x="252" y="48" width="215" height="435" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="360" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">(a−b)² 完全平方</text>
<rect x="279" y="90" width="160" height="160" fill="#2563eb" opacity="0.07" stroke="#2563eb" stroke-width="1.5"/>
<line x1="359" y1="90" x2="359" y2="250" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="279" y1="170" x2="439" y2="170" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3"/>
<text x="319" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">(a−b)²</text>
<text x="399" y="145" text-anchor="middle" font-size="12" fill="#6b7280">b(a−b)</text>
<text x="319" y="230" text-anchor="middle" font-size="12" fill="#6b7280">b(a−b)</text>
<text x="399" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">b²</text>
<text x="295" y="88" font-size="11" fill="#6b7280">a−b</text>
<text x="395" y="85" font-size="11" fill="#6b7280">b</text>
<text x="270" y="130" font-size="11" fill="#6b7280">a−b</text>
<text x="270" y="215" font-size="11" fill="#6b7280">b</text>
<text x="360" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">(a−b)²=a²−2ab+b²</text>
<line x1="272" y1="295" x2="447" y2="295" stroke="#e5e7eb" stroke-width="1"/>
<text x="360" y="318" text-anchor="middle" font-size="11" fill="#374151">例: (x−3)²</text>
<text x="360" y="338" text-anchor="middle" font-size="11" fill="#6b7280">=x²−2·x·3+3²=x²−6x+9</text>
<text x="360" y="365" text-anchor="middle" font-size="11" fill="#374151">因式分解:</text>
<text x="360" y="385" text-anchor="middle" font-size="11" fill="#2563eb">a²−2ab+b²=(a−b)²</text>
<rect x="485" y="48" width="215" height="435" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="592" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">a²−b² 平方差</text>
<rect x="512" y="90" width="160" height="160" fill="#d97706" opacity="0.07" stroke="#d97706" stroke-width="1.5"/>
<rect x="592" y="90" width="80" height="80" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="592" y1="90" x2="592" y2="250" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="512" y1="170" x2="672" y2="170" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3"/>
<text x="552" y="140" text-anchor="middle" font-size="13" fill="#374151">a</text>
<text x="632" y="140" text-anchor="middle" font-size="12" fill="#6b7280">b</text>
<text x="503" y="135" font-size="11" fill="#6b7280">a</text>
<text x="503" y="215" font-size="11" fill="#6b7280">b</text>
<rect x="517" y="278" width="150" height="50" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="1.2"/>
<text x="592" y="298" text-anchor="middle" font-size="12" fill="#374151">(a+b)(a−b) 矩形</text>
<text x="592" y="316" text-anchor="middle" font-size="10" fill="#6b7280">L形剪切→矩形</text>
<text x="592" y="345" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">a²−b²=(a+b)(a−b)</text>
<line x1="505" y1="362" x2="680" y2="362" stroke="#e5e7eb" stroke-width="1"/>
<text x="592" y="385" text-anchor="middle" font-size="11" fill="#374151">例: x²−9</text>
<text x="592" y="405" text-anchor="middle" font-size="11" fill="#6b7280">=(x+3)(x−3)</text>
</svg>