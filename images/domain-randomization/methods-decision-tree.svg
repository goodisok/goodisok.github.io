<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1000" height="600" fill="#ffffff"/>
  <text x="500" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">Sim-to-Real 方法选择决策树</text>
  <rect x="260" y="55" width="440" height="50" rx="12" fill="#111827" filter="url(#shadow)"/>
  <text x="480" y="86" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">你是否能获取真实世界数据？</text>
  <line x1="380" y1="105" x2="200" y2="160" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="275" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">不能</text>
  <rect x="80" y="165" width="240" height="50" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">域随机化 或 零样本迁移</text>
  <text x="200" y="204" text-anchor="middle" font-size="10" fill="#6b7280">实施最简单, 效果最稳定</text>
  <line x1="200" y1="215" x2="130" y2="270" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="155" y="238" text-anchor="middle" font-size="10" fill="#2563eb">视觉为主</text>
  <rect x="30" y="275" width="200" height="55" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="130" y="298" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">域随机化</text>
  <text x="130" y="316" text-anchor="middle" font-size="10" fill="#6b7280">纹理/光照/相机全随机</text>
  <line x1="200" y1="215" x2="270" y2="270" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="245" y="238" text-anchor="middle" font-size="10" fill="#2563eb">动力学为主</text>
  <rect x="170" y="275" width="200" height="55" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="270" y="298" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">零样本 + 系统辨识</text>
  <text x="270" y="316" text-anchor="middle" font-size="10" fill="#6b7280">精准建模 → 直接部署</text>
  <line x1="580" y1="105" x2="760" y2="160" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="680" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">能</text>
  <rect x="640" y="165" width="280" height="50" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="780" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">数据量多少？</text>
  <text x="780" y="204" text-anchor="middle" font-size="10" fill="#6b7280">专家示范 vs 无标注</text>
  <line x1="700" y1="215" x2="590" y2="270" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="460" y="275" width="220" height="50" rx="8" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="570" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#0891b2">直接真实世界训练 RL</text>
  <text x="570" y="314" text-anchor="middle" font-size="10" fill="#6b7280">不需要 Sim-to-Real</text>
  <line x1="780" y1="215" x2="780" y2="270" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="670" y="275" width="220" height="50" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="780" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#ea580c">模仿学习</text>
  <text x="780" y="314" text-anchor="middle" font-size="10" fill="#6b7280">遥操作/VR 专家示范</text>
  <line x1="850" y1="215" x2="875" y2="270" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="780" y="275" width="190" height="50" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="875" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">域自适应</text>
  <text x="875" y="314" text-anchor="middle" font-size="10" fill="#6b7280">少量真数据对齐特征</text>
  <rect x="100" y="370" width="800" height="90" rx="10" fill="#111827" filter="url(#shadow)"/>
  <text x="500" y="398" text-anchor="middle" font-size="14" font-weight="600" fill="#fbbf24">黄金法则</text>
  <text x="500" y="420" text-anchor="middle" font-size="12" fill="#e5e7eb">最成功的 Sim-to-Real = 域随机化(基线) + 域自适应(如果真数据) + 微调</text>
  <text x="500" y="442" text-anchor="middle" font-size="12" fill="#9ca3af">单一方法很少够用, 组合才是正道</text>
  <rect x="190" y="490" width="620" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="515" text-anchor="middle" font-size="12" fill="#6b7280">2026 年新趋势: 可微物理 × 域随机化 × GPU 并行 → 端到端优化</text>
</svg>