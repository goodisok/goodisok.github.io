  <text x="380" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#d97706">含干扰物</text>
  <rect x="305" y="466.0" width="40" height="54.0" rx="3" fill="#22c55e" filter="url(#shadow)"/>
  <text x="325.0" y="461.0" text-anchor="middle" font-size="10" font-weight="600" fill="#22c55e">1.8</text>
  <rect x="355" y="463.0" width="40" height="57.0" rx="3" fill="#86efac" filter="url(#shadow)"/>
  <text x="375.0" y="458.0" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">1.9</text>
  <rect x="405" y="448.0" width="40" height="72.0" rx="3" fill="#fbbf24" filter="url(#shadow)"/>
  <text x="425.0" y="443.0" text-anchor="middle" font-size="10" font-weight="600" fill="#fbbf24">2.4</text>
  <rect x="455" y="304.0" width="40" height="216.0" rx="3" fill="#ef4444" filter="url(#shadow)"/>
  <text x="475.0" y="299.0" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">7.2</text>
  <rect x="570" y="90" width="200" height="430" rx="8" fill="#fce7f3" fill-opacity="0.4" stroke="#db2777" stroke-width="1" stroke-opacity="0.2"/>
  <text x="630" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#db2777">含遮挡</text>
  <rect x="555" y="448.0" width="40" height="72.0" rx="3" fill="#22c55e" filter="url(#shadow)"/>
  <text x="575.0" y="443.0" text-anchor="middle" font-size="10" font-weight="600" fill="#22c55e">2.4</text>
  <rect x="605" y="448.0" width="40" height="72.0" rx="3" fill="#86efac" filter="url(#shadow)"/>
  <text x="625.0" y="443.0" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">2.4</text>
  <rect x="655" y="433.0" width="40" height="87.0" rx="3" fill="#fbbf24" filter="url(#shadow)"/>
  <text x="675.0" y="428.0" text-anchor="middle" font-size="10" font-weight="600" fill="#fbbf24">2.9</text>
  <rect x="705" y="298.0" width="40" height="222.0" rx="3" fill="#ef4444" filter="url(#shadow)"/>
  <text x="725.0" y="293.0" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">7.4</text>
  <rect x="200" y="560" width="16" height="16" rx="3" fill="#22c55e"/>
  <text x="222" y="573" font-size="12" fill="#4b5563">完整方法</text>
  <rect x="355" y="560" width="16" height="16" rx="3" fill="#86efac"/>
  <text x="377" y="573" font-size="12" fill="#4b5563">无噪声</text>
  <rect x="510" y="560" width="16" height="16" rx="3" fill="#fbbf24"/>
  <text x="532" y="573" font-size="12" fill="#4b5563">无相机随机化</text>
  <rect x="665" y="560" width="16" height="16" rx="3" fill="#ef4444"/>
  <text x="687" y="573" font-size="12" fill="#4b5563">无干扰物训练</text>
  <text x="700" y="130" text-anchor="start" font-size="11" font-weight="700" fill="#ef4444">⚠ 关键发现:</text>
  <text x="700" y="148" text-anchor="start" font-size="11" fill="#ef4444">去掉干扰物训练后</text>
  <text x="700" y="166" text-anchor="start" font-size="11" fill="#ef4444">误差 1.8 → 7.2 cm</text>
  <text x="700" y="184" text-anchor="start" font-size="10" fill="#9ca3af">(飙升 4 倍)</text>
</svg>