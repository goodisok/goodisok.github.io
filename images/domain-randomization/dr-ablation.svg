  <rect x="105" y="478.0" width="40" height="42.0" rx="3" fill="#86efac" filter="url(#shadow)"/>
  <rect x="155" y="460.0" width="40" height="60.0" rx="3" fill="#fbbf24" filter="url(#shadow)"/>
