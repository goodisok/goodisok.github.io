  <text x="38" y="404" text-anchor="end" font-size="10" fill="#6b7280">4</text>
  <line x1="45" y1="370" x2="55" y2="370" stroke="#d1d5db" stroke-width="1"/>
  <text x="38" y="374" text-anchor="end" font-size="10" fill="#6b7280">5</text>
  <line x1="45" y1="340" x2="55" y2="340" stroke="#d1d5db" stroke-width="1"/>
  <text x="38" y="344" text-anchor="end" font-size="10" fill="#6b7280">6</text>
  <line x1="45" y1="310" x2="55" y2="310" stroke="#d1d5db" stroke-width="1"/>
  <text x="38" y="314" text-anchor="end" font-size="10" fill="#6b7280">7</text>
  <line x1="45" y1="280" x2="55" y2="280" stroke="#d1d5db" stroke-width="1"/>
  <text x="38" y="284" text-anchor="end" font-size="10" fill="#6b7280">8</text>
  <text x="20" y="310" text-anchor="middle" font-size="11" fill="#6b7280" transform="rotate(-90,20,310)">误差 (cm) ↓ 越低越好</text>
  <rect x="70" y="90" width="200" height="430" rx="8" fill="#dbeafe" fill-opacity="0.4" stroke="#2563eb" stroke-width="1" stroke-opacity="0.2"/>
  <text x="130" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">仅目标物</text>
