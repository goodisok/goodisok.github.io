  <text x="38" y="494" text-anchor="end" font-size="10" fill="#6b7280">1</text>
  <line x1="45" y1="460" x2="55" y2="460" stroke="#d1d5db" stroke-width="1"/>
  <text x="38" y="464" text-anchor="end" font-size="10" fill="#6b7280">2</text>
  <line x1="45" y1="430" x2="55" y2="430" stroke="#d1d5db" stroke-width="1"/>
  <text x="38" y="434" text-anchor="end" font-size="10" fill="#6b7280">3</text>
