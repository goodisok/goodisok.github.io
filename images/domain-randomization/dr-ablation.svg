<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">消融实验结果: 什么最重要？</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#6b7280">Tobin et al. 2017 — 逐步去掉每个随机化组件, 观察真实世界误差</text>
  <line x1="50" y1="100" x2="50" y2="520" stroke="#d1d5db" stroke-width="1"/>
