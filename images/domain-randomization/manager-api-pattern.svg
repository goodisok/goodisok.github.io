<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="960" height="580" fill="#ffffff"/>
  <text x="480" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">Manager-Based API 设计模式</text>
  <text x="480" y="55" text-anchor="middle" font-size="12" fill="#6b7280">将 RL 环境拆解为五大可复用管理器 → 乐高式组合</text>
  <rect x="25" y="80" width="290" height="460" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="108" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">传统方式: 单体环境</text>
  <rect x="45" y="125" width="250" height="35" rx="5" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="148" text-anchor="middle" font-size="11" fill="#dc2626">step(action) 大杂烩函数</text>
  <text x="170" y="185" text-anchor="middle" font-size="10" fill="#9ca3af">物理步进 + 观测 + 奖励 +</text>
  <text x="170" y="200" text-anchor="middle" font-size="10" fill="#9ca3af">终止 + 域随机化 全混在一起</text>
  <text x="170" y="235" text-anchor="middle" font-size="11" fill="#dc2626">❌ 改一个要翻整个文件</text>
  <text x="170" y="255" text-anchor="middle" font-size="11" fill="#dc2626">❌ 环境之间无法复用</text>
  <text x="170" y="275" text-anchor="middle" font-size="11" fill="#dc2626">❌ 团队协作困难</text>
  <rect x="645" y="80" width="290" height="460" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="790" y="108" text-anchor="middle" font-size="14" font-weight="600" fill="#16a34a">Isaac Lab: 管理器组合</text>
  <rect x="665" y="125" width="250" height="35" rx="5" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
  <text x="790" y="148" text-anchor="middle" font-size="11" fill="#16a34a">环境 = 组合 5 个管理器</text>
  <rect x="665" y="175" width="250" height="55" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="665" y="175" width="250" height="22" rx="6" fill="#2563eb" fill-opacity="0.1"/>
  <rect x="665" y="191" width="250" height="6" fill="#2563eb" fill-opacity="0.1"/>
  <text x="790" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">观测管理器</text>
  <text x="790" y="217" text-anchor="middle" font-size="10" fill="#6b7280">图像/LiDAR/IMU</text>
  <rect x="665" y="240" width="250" height="55" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="665" y="240" width="250" height="22" rx="6" fill="#7c3aed" fill-opacity="0.1"/>
  <rect x="665" y="256" width="250" height="6" fill="#7c3aed" fill-opacity="0.1"/>
  <text x="790" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">动作管理器</text>
  <text x="790" y="282" text-anchor="middle" font-size="10" fill="#6b7280">电机/舵机/力控</text>
  <rect x="665" y="305" width="250" height="55" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="665" y="305" width="250" height="22" rx="6" fill="#ea580c" fill-opacity="0.1"/>
  <rect x="665" y="321" width="250" height="6" fill="#ea580c" fill-opacity="0.1"/>
  <text x="790" y="321" text-anchor="middle" font-size="11" font-weight="600" fill="#ea580c">奖励管理器</text>
  <text x="790" y="347" text-anchor="middle" font-size="10" fill="#6b7280">稀疏/稠密/成型</text>
  <rect x="665" y="370" width="250" height="55" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="665" y="370" width="250" height="22" rx="6" fill="#dc2626" fill-opacity="0.1"/>
  <rect x="665" y="386" width="250" height="6" fill="#dc2626" fill-opacity="0.1"/>
  <text x="790" y="386" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">终止管理器</text>
  <text x="790" y="412" text-anchor="middle" font-size="10" fill="#6b7280">成功/失败/超时</text>
  <rect x="665" y="435" width="250" height="55" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="665" y="435" width="250" height="22" rx="6" fill="#d97706" fill-opacity="0.1"/>
  <rect x="665" y="451" width="250" height="6" fill="#d97706" fill-opacity="0.1"/>
  <text x="790" y="451" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">域随机化管理器</text>
  <text x="790" y="477" text-anchor="middle" font-size="10" fill="#6b7280">纹理/物理/光照</text>
  <text x="790" y="510" text-anchor="middle" font-size="11" fill="#16a34a">✓ 独立开发/测试</text>
  <text x="790" y="528" text-anchor="middle" font-size="11" fill="#16a34a">✓ 跨环境复用</text>
  <rect x="350" y="160" width="260" height="280" rx="12" fill="#111827" filter="url(#shadow)"/>
  <text x="480" y="188" text-anchor="middle" font-size="14" font-weight="600" fill="#fbbf24">RL 训练循环</text>
  <text x="480" y="208" text-anchor="middle" font-size="10" fill="#9ca3af">PPO / SAC / TRPO</text>
  <rect x="370" y="235" width="220" height="28" rx="5" fill="#93c5fd" fill-opacity="0.15" stroke="#93c5fd" stroke-width="1"/>
  <text x="480" y="254" text-anchor="middle" font-size="11" fill="#93c5fd">观测 → 策略</text>
  <rect x="370" y="271" width="220" height="28" rx="5" fill="#c4b5fd" fill-opacity="0.15" stroke="#c4b5fd" stroke-width="1"/>
  <text x="480" y="290" text-anchor="middle" font-size="11" fill="#c4b5fd">策略 → 动作</text>
  <rect x="370" y="307" width="220" height="28" rx="5" fill="#fdba74" fill-opacity="0.15" stroke="#fdba74" stroke-width="1"/>
  <text x="480" y="326" text-anchor="middle" font-size="11" fill="#fdba74">动作 → 仿真步进</text>
  <rect x="370" y="343" width="220" height="28" rx="5" fill="#fca5a5" fill-opacity="0.15" stroke="#fca5a5" stroke-width="1"/>
  <text x="480" y="362" text-anchor="middle" font-size="11" fill="#fca5a5">步进 → 奖励/终止</text>
  <rect x="370" y="379" width="220" height="28" rx="5" fill="#fcd34d" fill-opacity="0.15" stroke="#fcd34d" stroke-width="1"/>
  <text x="480" y="398" text-anchor="middle" font-size="11" fill="#fcd34d">随机化 → 新 episode</text>
  <line x1="315" y1="200" x2="350" y2="200" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="610" y1="202" x2="665" y2="202" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="610" y1="267" x2="665" y2="267" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="610" y1="332" x2="665" y2="332" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="610" y1="397" x2="665" y2="397" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="610" y1="462" x2="665" y2="462" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="250" y="520" width="460" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="540" text-anchor="middle" font-size="11" fill="#6b7280">Manager API 是可选的 — 简单场景可以直接用单文件脚本</text>
</svg>