  <text x="510" y="242" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">六组件 → 统一管线: 可微仿真 → 策略训练 → 域随机化 → 真机部署</text>
  <text x="510" y="264" text-anchor="middle" font-size="11" fill="#6b7280">六个任务验证 (悬停·追踪·避障·着陆·穿框·追逐) — 全部零样本 Sim-to-Real</text>
  <rect x="60" y="295" width="420" height="80" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="270" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">传统管线 (解耦)</text>
  <text x="270" y="342" text-anchor="middle" font-size="11" fill="#4b5563">感知 → 规划 → 控制 → 各模块独立调试</text>
  <text x="270" y="362" text-anchor="middle" font-size="11" fill="#dc2626">模块间接口需手动定义</text>
  <rect x="540" y="295" width="420" height="80" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="750" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">E2E-Fly 管线 (端到端)</text>
  <text x="750" y="342" text-anchor="middle" font-size="11" fill="#4b5563">深度图 → 神经网络 → 体速率 → 联合优化</text>
  <text x="750" y="362" text-anchor="middle" font-size="11" fill="#16a34a">梯度穿过整个管线</text>
