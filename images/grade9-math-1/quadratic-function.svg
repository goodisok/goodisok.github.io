<circle cx="160" cy="220" r="3" fill="#16a34a"/>
<text x="142" y="215" font-size="10" fill="#374151">(0,1)</text>
<circle cx="280" cy="220" r="3" fill="#16a34a"/>
<text x="285" y="215" font-size="10" fill="#374151">(4,1)</text>
<rect x="375" y="48" width="320" height="415" rx="8" fill="#fef2f2" stroke="#d1d5db" stroke-width="1"/>
<text x="535" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">a &lt; 0 开口向下</text>
<line x1="420" y1="250" x2="645" y2="250" stroke="#9ca3af" stroke-width="0.8"/>
<line x1="510" y1="380" x2="510" y2="75" stroke="#9ca3af" stroke-width="0.8"/>
