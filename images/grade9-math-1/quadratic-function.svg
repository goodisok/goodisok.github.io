<polygon points="160,75 157,80 163,80" fill="#9ca3af"/>
<text x="300" y="254" font-size="10" fill="#6b7280">x</text>
<text x="154" y="82" font-size="10" fill="#6b7280">y</text>
<path d="M 100,340 Q 190,280 220,340 Q 250,280 340,340" fill="none" stroke="#16a34a" stroke-width="2.5"/>
<circle cx="220" cy="340" r="4" fill="#16a34a"/>
<text x="230" y="345" font-size="12" font-weight="700" fill="#16a34a">顶点(2,−3)</text>
