<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480">
<style>text{font-family:"WenQuanYi Zen Hei","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}</style>
<rect width="720" height="480" fill="#ffffff"/>
<text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">二次函数 y = ax² + bx + c</text>
