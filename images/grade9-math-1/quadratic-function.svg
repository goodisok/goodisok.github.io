<circle cx="570" cy="160" r="4" fill="#dc2626"/>
<text x="580" y="155" font-size="12" font-weight="700" fill="#dc2626">顶点(2,3)</text>
<line x1="570" y1="80" x2="570" y2="370" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
<text x="558" y="90" font-size="10" fill="#dc2626">x=2</text>
<circle cx="510" cy="280" r="3" fill="#dc2626"/>
<text x="492" y="285" font-size="10" fill="#374151">(0,−1)</text>
<circle cx="630" cy="280" r="3" fill="#dc2626"/>
