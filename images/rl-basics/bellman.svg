<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
<style>
text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif; }
</style>
<defs>
<marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
</defs>
<rect width="960" height="700" fill="#ffffff"/>
<text x="480" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Bellman 方程：价值分解的直观理解</text>
<rect x="80" y="60" width="800" height="80" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
<text x="105" y="95" font-size="14" font-weight="600" fill="#1d4ed8">Bellman 方程：</text>
<text x="105" y="118" font-family="monospace" font-size="16" font-weight="600" fill="#111827">Q(s,a) = r + γ · max Q(s', a')</text>
<text x="105" y="110" font-family="monospace" font-size="16" font-weight="600" fill="#111827">            </text>
<rect x="60" y="190" width="240" height="180" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="180" y="220" text-anchor="middle" font-size="15" font-weight="600" fill="#dc2626">即时奖励 r</text>
<text x="180" y="255" text-anchor="middle" font-size="13" fill="#374151">当前动作带来的</text>
<text x="180" y="275" text-anchor="middle" font-size="13" fill="#374151">立即收益</text>
<text x="180" y="320" text-anchor="middle" font-size="12" fill="#6b7280">当前这一步能</text>
<text x="180" y="340" text-anchor="middle" font-size="12" fill="#6b7280">拿到多少分</text>
<rect x="360" y="190" width="240" height="180" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<text x="480" y="220" text-anchor="middle" font-size="15" font-weight="600" fill="#16a34a">折扣因子 γ</text>
<text x="480" y="255" text-anchor="middle" font-size="13" fill="#374151">0 ≤ γ ≤ 1</text>
<text x="480" y="275" text-anchor="middle" font-size="13" fill="#374151">控制远见程度</text>
<text x="480" y="320" text-anchor="middle" font-size="12" fill="#6b7280">γ=0：只看眼前</text>
<text x="480" y="340" text-anchor="middle" font-size="12" fill="#6b7280">γ=0.99：长远规划</text>
<rect x="660" y="190" width="240" height="180" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="780" y="220" text-anchor="middle" font-size="15" font-weight="600" fill="#2563eb">未来价值 max Q(s',a')</text>
<text x="780" y="255" text-anchor="middle" font-size="13" fill="#374151">下一个状态中</text>
<text x="780" y="275" text-anchor="middle" font-size="13" fill="#374151">最佳动作的价值</text>
<text x="780" y="320" text-anchor="middle" font-size="12" fill="#6b7280">继续走下去</text>
<text x="780" y="340" text-anchor="middle" font-size="12" fill="#6b7280">能拿多少分</text>
<text x="315" y="285" text-anchor="middle" font-size="24" font-weight="600" fill="#6b7280">+</text>
<text x="615" y="285" text-anchor="middle" font-size="24" font-weight="600" fill="#6b7280">×</text>
<rect x="80" y="410" width="800" height="100" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="105" y="440" font-size="14" font-weight="600" fill="#111827">TD 误差（时序差分学习）</text>
<text x="105" y="468" font-family="monospace" font-size="15" font-weight="600" fill="#ea580c">δ = r + γ·max Q(s',a') − Q(s,a)</text>
<text x="105" y="495" font-size="12" fill="#6b7280">「现实」与「预期」的差距 → 用来修正 Q 值 → Q(s,a) ← Q(s,a) + α·δ</text>
<text x="480" y="548" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">在飞行器中的应用</text>
<rect x="80" y="570" width="250" height="110" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
<text x="205" y="595" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">无人机飞控</text>
<text x="205" y="615" text-anchor="middle" font-size="11" fill="#374151">s=位姿+速度, a=电机指令</text>
<text x="205" y="635" text-anchor="middle" font-size="11" fill="#374151">Q值 = 稳定性奖励 + γ×未来轨迹得分</text>
<rect x="360" y="570" width="250" height="110" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
<text x="485" y="595" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">截击制导</text>
<text x="485" y="615" text-anchor="middle" font-size="11" fill="#374151">s=视线角速率, a=过载指令</text>
<text x="485" y="635" text-anchor="middle" font-size="11" fill="#374151">Q值 = 命中奖励 + γ×后续优势</text>
<rect x="640" y="570" width="250" height="110" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
<text x="765" y="595" text-anchor="middle" font-size="14" font-weight="600" fill="#16a34a">路径规划</text>
<text x="765" y="615" text-anchor="middle" font-size="11" fill="#374151">s=当前位置, a=航点选择</text>
<text x="765" y="635" text-anchor="middle" font-size="11" fill="#374151">Q值 = 接近目标 + γ×剩余路程估值</text>
</svg>