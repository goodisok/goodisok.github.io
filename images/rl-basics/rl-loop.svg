<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
<style>
text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif; }
</style>
<defs>
<marker id="arrow-a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
</defs>
<rect width="960" height="600" fill="#ffffff"/>
<text x="480" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">强化学习：Agent 与环境交互循环</text>
<rect x="380" y="120" width="200" height="100" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
<text x="480" y="155" text-anchor="middle" font-size="16" font-weight="600" fill="#1d4ed8">Agent（智能体）</text>
<text x="480" y="180" text-anchor="middle" font-size="12" fill="#6b7280">策略 π(a|s)</text>
<text x="480" y="200" text-anchor="middle" font-size="12" fill="#6b7280">神经网络 / Q-Table</text>
<rect x="380" y="380" width="200" height="100" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
<text x="480" y="415" text-anchor="middle" font-size="16" font-weight="600" fill="#15803d">Environment（环境）</text>
<text x="480" y="440" text-anchor="middle" font-size="12" fill="#6b7280">物理仿真 / 真实世界</text>
<text x="480" y="460" text-anchor="middle" font-size="12" fill="#6b7280">状态转移 + 奖励</text>
<path d="M 480 220 L 480 370" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-a)"/>
<rect x="440" y="280" width="80" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
<text x="480" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">动作 a</text>
<path d="M 550 380 L 550 230" stroke="#ea580c" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-o)"/>
<rect x="518" y="290" width="64" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
<text x="550" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#ea580c">观测 s'</text>
<path d="M 620 430 L 620 190" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-r)"/>
<rect x="590" y="295" width="60" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
<text x="620" y="311" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">奖励 r</text>
<text x="260" y="180" text-anchor="middle" font-size="12" fill="#6b7280">当前状态 s</text>
<line x1="260" y1="185" x2="370" y2="175" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
<rect x="80" y="520" width="800" height="60" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="480" y="543" text-anchor="middle" font-size="13" fill="#374151">Agent 选择动作 a，环境返回新状态 s' 和奖励 r</text>
  <text x="480" y="565" text-anchor="middle" font-size="13" fill="#374151">目标：最大化累积折扣奖励  Σ γᵗ · rₜ</text>
</svg>