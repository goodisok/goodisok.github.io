<text x="170" y="256.0" text-anchor="end" fill="#e6edf3" font-size="11" font-weight="bold" font-family="sans-serif">AI 生成</text>
<rect x="260.0" y="238" width="160.0" height="28" rx="5" fill="#d4621155" stroke="#f0883e" stroke-width="1.5"/>
<text x="430.0" y="256.0" fill="#f0883e" font-size="10" font-weight="bold" font-family="sans-serif">TRL 2-4</text>
<text x="170" y="302.0" text-anchor="end" fill="#e6edf3" font-size="11" font-weight="bold" font-family="sans-serif">自带资产</text>
<rect x="740.0" y="284" width="80.0" height="28" rx="5" fill="#d2992255" stroke="#f0c000" stroke-width="1.5"/>
<text x="830.0" y="302.0" fill="#f0c000" font-size="10" font-weight="bold" font-family="sans-serif">TRL 8-9</text>
<text x="425" y="346" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif">成熟度依据：工业部署案例数 + 社区规模 + 实机验证报告 + 工具链完整性（详见文章5-6节）</text>
</svg>