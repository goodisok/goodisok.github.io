<text x="260.0" y="320" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif">TRL 2</text>
<line x1="340.0" y1="300" x2="340.0" y2="308" stroke="#484f58" stroke-width="0.8"/>
<text x="340.0" y="320" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif">TRL 3</text>
<line x1="420.0" y1="300" x2="420.0" y2="308" stroke="#484f58" stroke-width="0.8"/>
<text x="420.0" y="320" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif">TRL 4</text>
<line x1="500.0" y1="300" x2="500.0" y2="308" stroke="#484f58" stroke-width="0.8"/>
<text x="500.0" y="320" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif">TRL 5</text>
<line x1="580.0" y1="300" x2="580.0" y2="308" stroke="#484f58" stroke-width="0.8"/>
<text x="580.0" y="320" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif">TRL 6</text>
<line x1="660.0" y1="300" x2="660.0" y2="308" stroke="#484f58" stroke-width="0.8"/>
<text x="660.0" y="320" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif">TRL 7</text>
<line x1="740.0" y1="300" x2="740.0" y2="308" stroke="#484f58" stroke-width="0.8"/>
<text x="740.0" y="320" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif">TRL 8</text>
<line x1="820.0" y1="300" x2="820.0" y2="308" stroke="#484f58" stroke-width="0.8"/>
<text x="820.0" y="320" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif">TRL 9</text>
<text x="170" y="118.0" text-anchor="end" fill="#e6edf3" font-size="11" font-weight="bold" font-family="sans-serif">手工建模</text>
<rect x="740.0" y="100" width="80.0" height="28" rx="5" fill="#1f6feb55" stroke="#58a6ff" stroke-width="1.5"/>
<text x="830.0" y="118.0" fill="#58a6ff" font-size="10" font-weight="bold" font-family="sans-serif">TRL 8-9</text>
<text x="170" y="164.0" text-anchor="end" fill="#e6edf3" font-size="11" font-weight="bold" font-family="sans-serif">摄影测量</text>
<rect x="660.0" y="146" width="80.0" height="28" rx="5" fill="#2ea04355" stroke="#3fb950" stroke-width="1.5"/>
<text x="750.0" y="164.0" fill="#3fb950" font-size="10" font-weight="bold" font-family="sans-serif">TRL 7-8</text>
<text x="170" y="210.0" text-anchor="end" fill="#e6edf3" font-size="11" font-weight="bold" font-family="sans-serif">3DGS</text>
