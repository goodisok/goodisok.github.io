<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 380" width="850" height="380">
<rect width="850" height="380" fill="#0d1117"/>
<text x="425" y="30" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold" font-family="sans-serif">五类方案 TRL 成熟度对比</text>
<text x="425" y="48" text-anchor="middle" fill="#8b949e" font-size="10" font-family="sans-serif">TRL 1-3 = 基础研究 · TRL 4-6 = 技术验证 · TRL 7-9 = 工程化/产品化</text>
<rect x="180.0" y="68" width="160.0" height="240" fill="#1a1a2e" rx="2"/>
