  <line x1="950" y1="190" x2="1010" y2="190" stroke="#059669" stroke-width="1.5" marker-end="url(#a-green)"/>
  <rect x="964" y="166" width="32" height="14" rx="3" fill="#ffffff" opacity="0.95"/>
