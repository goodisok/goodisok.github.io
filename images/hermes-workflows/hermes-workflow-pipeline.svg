  <rect x="490" y="198" width="130" height="36" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="555" y="218" text-anchor="middle" font-size="11" fill="#111827">Worker 3: 排序评分</text>
