  <rect x="1034" y="240" width="72" height="18" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1070" y="253" text-anchor="middle" font-size="10" fill="#64748b">增量简报</text>
