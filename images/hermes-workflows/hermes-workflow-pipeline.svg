  <path d="M 620 216 L 660 216 L 660 190 L 680 190" stroke="#ea580c" stroke-width="1.2" fill="none" marker-end="url(#a-orange)"/>
  <text x="105" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">① 触发</text>
  <text x="280" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">② 检索</text>
  <text x="470" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">③ 并行分析</text>
  <text x="735" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">④ 去重</text>
  <text x="900" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">⑤ 入库</text>
  <text x="1070" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">⑥ 投递</text>
  <text x="600" y="380" text-anchor="middle" font-size="12" fill="#9ca3af">管道方向：从 Cron 定时触发开始 → 到 send_message 投递结束，中间经过搜索、并行分析、去重、入库四个环节</text>
  <line x1="50" y1="340" x2="74" y2="340" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <text x="82" y="344" font-size="11" fill="#6b7280">主线流向</text>
